<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Компьютерная грамота — 2 класс</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

:root {
  --bg: #eef4ff;
  --card: #ffffff;
  --primary: #2563eb;
  --primary-light: #dbeafe;
  --green: #16a34a;
  --green-light: #dcfce7;
  --red: #dc2626;
  --red-light: #fee2e2;
  --text: #1e293b;
  --muted: #64748b;
  --border: #cbd5e1;
  --radius: 18px;
  --shadow: 0 4px 24px rgba(37,99,235,0.10);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  color: var(--text);
  padding: 20px 16px 40px;
  font-size: 18px;
}

.header { text-align: center; margin-bottom: 22px; }
.header h1 { font-size: 2.2rem; font-weight: 900; color: var(--primary); }
.header p  { font-size: 1.1rem; color: var(--muted); margin-top: 4px; }

.progress-wrap {
  max-width: 680px; margin: 0 auto 22px;
  background: var(--card); border-radius: 50px;
  padding: 10px 20px; box-shadow: var(--shadow);
  display: flex; align-items: center; gap: 14px;
}
.prog-label { font-size: 1rem; font-weight: 700; color: var(--muted); white-space: nowrap; }
.prog-bg { flex: 1; height: 12px; background: var(--border); border-radius: 50px; overflow: hidden; }
.prog-fill { height: 100%; background: linear-gradient(90deg, var(--primary), #7c3aed); border-radius: 50px; transition: width .5s; width: 0%; }
.score-badge { background: var(--primary-light); color: var(--primary); font-weight: 800; font-size: 1rem; padding: 4px 14px; border-radius: 50px; white-space: nowrap; }

.card {
  background: var(--card); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 28px 28px 24px;
  max-width: 680px; margin: 0 auto 20px;
  border: 3px solid transparent; transition: border-color .3s;
}
.card.ok  { border-color: var(--green); }
.card.bad { border-color: var(--red);   }

.task-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--primary-light); color: var(--primary);
  font-weight: 800; font-size: 0.95rem;
  padding: 6px 16px; border-radius: 50px; margin-bottom: 16px;
}

.hint-box {
  border: 2px dashed var(--border); border-radius: 14px;
  padding: 16px 20px; margin-bottom: 20px;
  background: #f8faff; font-size: 1.1rem; line-height: 1.8;
}
.hint-box b { color: var(--primary); }

.key-chip {
  display: inline-block; background: #fff;
  border: 2px solid #94a3b8; border-bottom: 4px solid #64748b;
  border-radius: 7px; padding: 2px 12px;
  font-weight: 800; font-size: 0.95rem; color: var(--text);
  margin: 0 3px; vertical-align: middle;
}

.mouse-row { display: flex; align-items: center; gap: 16px; margin-top: 12px; }
.mouse-body {
  width: 58px; height: 88px; background: #e2e8f0;
  border-radius: 29px 29px 18px 18px; border: 2px solid #94a3b8;
  display: flex; flex-direction: column; overflow: hidden; position: relative;
  flex-shrink: 0;
}
.mouse-top { display: flex; height: 42px; border-bottom: 2px solid #94a3b8; }
.mouse-l   { flex: 1; border-right: 1px solid #94a3b8; border-radius: 27px 0 0 0; transition: background .2s; }
.mouse-r   { flex: 1; border-radius: 0 27px 0 0; transition: background .2s; }
.mouse-l.lit { background: var(--primary); }
.mouse-r.lit { background: #f97316; }
.mouse-wheel {
  position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
  width: 8px; height: 18px; background: #94a3b8; border-radius: 4px;
}
.mouse-bot { flex: 1; }

.instruction {
  font-size: 1.4rem; font-weight: 800; margin-bottom: 18px;
  color: var(--text); line-height: 1.5;
}
.instruction .target { color: var(--primary); }

/* SELECTION — drag highlight */
.sentence-area {
  font-size: 2.1rem; font-weight: 800;
  padding: 18px 22px; background: var(--bg);
  border-radius: 14px; border: 2px solid var(--border);
  line-height: 2.4; margin-bottom: 18px;
  user-select: none; cursor: default; position: relative;
}
.wt {
  display: inline-block;
  padding: 2px 4px; border-radius: 4px;
  cursor: text;
  position: relative;
  transition: background .08s;
}
.wt.hl { background: #3a6fdc; color: #fff; border-radius: 2px; }
/* space between words keeps highlight look natural */
.wt-space { display: inline-block; width: .55em; }
.wt-space.hl { background: #3a6fdc; }

/* CORRECTION */
.corr-label { font-size: 1.15rem; color: var(--muted); margin-bottom: 10px; }
.corr-label strong { font-size: 1.6rem; color: var(--green); letter-spacing: 3px; }
.editable-word {
  display: inline-flex; align-items: center; flex-wrap: wrap;
  font-size: 2.6rem; font-weight: 800;
  background: var(--bg); border: 2px solid var(--border);
  border-radius: 14px; padding: 14px 24px;
  min-width: 240px; cursor: text;
  letter-spacing: 4px; margin-bottom: 16px;
  user-select: none; outline: none;
  transition: border-color .2s;
}
.editable-word:focus,
.editable-word.focused { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.15); }
.ch { display: inline-block; }
.caret {
  display: inline-block; width: 3px; height: 2.4rem;
  background: var(--primary); border-radius: 2px;
  animation: blink 1s step-end infinite; vertical-align: middle;
  margin: 0 1px;
}
@keyframes blink { 50% { opacity: 0; } }

.key-buttons { display: flex; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; }
.key-btn {
  background: #fff; border: 2px solid var(--border);
  border-bottom: 5px solid #94a3b8;
  border-radius: 12px; padding: 10px 24px;
  font-family: 'Nunito', sans-serif; font-size: 1.15rem; font-weight: 800;
  cursor: pointer; transition: transform .1s, border-bottom-width .1s; color: var(--text);
}
.key-btn:active, .key-btn.pressed { transform: translateY(3px); border-bottom-width: 2px; }
.key-btn.bs { color: var(--red);  border-color: #fca5a5; border-bottom-color: var(--red); }
.key-btn.dl { color: #ea580c; border-color: #fdba74; border-bottom-color: #ea580c; }

/* TYPING */
.typing-area { margin-bottom: 18px; }
.typing-input {
  width: 100%; font-family: 'Nunito', sans-serif;
  font-size: 2rem; font-weight: 800;
  padding: 14px 20px; border: 2px solid var(--border);
  border-radius: 14px; outline: none; background: var(--bg);
  color: var(--text); transition: border-color .2s; letter-spacing: 2px;
}
.typing-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.15); }
.typing-hint {
  font-size: 1.05rem; color: var(--muted); background: var(--primary-light);
  border-radius: 10px; padding: 10px 16px; margin-top: 10px; line-height: 1.7;
}

/* BUTTONS */
.check-btn {
  background: linear-gradient(135deg, var(--primary), #7c3aed);
  color: #fff; border: none; border-radius: 50px;
  padding: 14px 38px; font-family: 'Nunito', sans-serif;
  font-size: 1.25rem; font-weight: 800; cursor: pointer;
  box-shadow: 0 4px 16px rgba(37,99,235,.25);
  transition: transform .15s, box-shadow .15s;
}
.check-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(37,99,235,.3); }

.next-btn {
  background: linear-gradient(135deg, var(--green), #15803d);
  color: #fff; border: none; border-radius: 50px;
  padding: 14px 34px; font-family: 'Nunito', sans-serif;
  font-size: 1.25rem; font-weight: 800; cursor: pointer;
  margin-top: 14px; display: none;
  box-shadow: 0 4px 16px rgba(22,163,74,.25);
  transition: transform .15s;
}
.next-btn.show { display: inline-block; }
.next-btn:hover { transform: translateY(-2px); }

/* FEEDBACK */
.feedback {
  margin-top: 18px; padding: 18px 20px;
  border-radius: 14px; font-size: 1.25rem; font-weight: 700;
  display: none; align-items: center; gap: 14px; line-height: 1.5;
}
.feedback.show { display: flex; }
.feedback.ok  { background: var(--green-light); color: #14532d; }
.feedback.bad { background: var(--red-light);   color: #7f1d1d; }
.feedback .emo { font-size: 2.4rem; flex-shrink: 0; }

/* RESULTS */
#results-screen { display: none; max-width: 680px; margin: 0 auto; text-align: center; }
.results-card { background: var(--card); border-radius: var(--radius); padding: 40px 28px; box-shadow: var(--shadow); }
.res-emo   { font-size: 5rem; display: block; margin-bottom: 12px; }
.res-title { font-size: 2.3rem; font-weight: 900; color: var(--primary); margin-bottom: 8px; }
.res-sub   { font-size: 1.2rem; color: var(--muted); margin-bottom: 24px; }
.score-circle {
  width: 140px; height: 140px; border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), #7c3aed);
  color: #fff; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  margin: 0 auto 28px;
  box-shadow: 0 8px 28px rgba(37,99,235,.35);
}
.score-circle .big   { font-size: 3.2rem; font-weight: 900; line-height: 1; }
.score-circle .small { font-size: 1.05rem; opacity: .85; }
.result-list { text-align: left; margin-bottom: 24px; display: flex; flex-direction: column; gap: 8px; }
.result-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 18px; background: var(--bg); border-radius: 12px; font-size: 1.1rem;
}
.restart-btn {
  background: linear-gradient(135deg, var(--primary), #7c3aed);
  color: #fff; border: none; border-radius: 50px;
  padding: 16px 42px; font-family: 'Nunito', sans-serif;
  font-size: 1.25rem; font-weight: 800; cursor: pointer;
  box-shadow: 0 4px 16px rgba(37,99,235,.25);
  transition: transform .15s;
}
.restart-btn:hover { transform: translateY(-2px); }
</style>
</head>
<body>

<div class="header">
  <h1>🖥️ Компьютерная грамота</h1>
  <p>Интерактивные упражнения — 2 класс</p>
</div>

<div class="progress-wrap" id="prog-wrap">
  <span class="prog-label" id="prog-label">Задание 1 из 6</span>
  <div class="prog-bg"><div class="prog-fill" id="prog-fill"></div></div>
  <div class="score-badge" id="score-badge">⭐ 0 / 10</div>
</div>

<div id="task-container"></div>

<div id="results-screen">
  <div class="results-card">
    <span class="res-emo"  id="res-emoji">🏆</span>
    <div class="res-title" id="res-title">Молодец!</div>
    <div class="res-sub"   id="res-sub">Ты прошёл все задания!</div>
    <div class="score-circle">
      <span class="big"  id="res-score">0</span>
      <span class="small">из 10</span>
    </div>
    <div class="result-list" id="res-list"></div>
    <button class="restart-btn" onclick="restart()">🔄 Начать заново</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  ДАННЫЕ
// ══════════════════════════════════════════════
const SEL_TASKS = [
  { sentence:"Мой класс учится хорошо", target:"класс" },
  { sentence:"Я люблю читать книги",    target:"книги"  },
  { sentence:"Кошка спит на диване",    target:"кошка"  },
  { sentence:"Синее небо красивое",     target:"небо"   },
  { sentence:"Мама готовит обед дома",  target:"обед"   },
  { sentence:"Белый снег лежит везде",  target:"снег"   },
];
const CORR_TASKS = [
  { wrong:"клаасс",  correct:"класс"   },
  { wrong:"шкоола",  correct:"школа"   },
  { wrong:"учетель", correct:"учитель" },
  { wrong:"дневнек", correct:"дневник" },
  { wrong:"тетраадь",correct:"тетрадь" },
];
const SHIFT_PAIRS = [
  { lower:"арбуз",   upper:"Арбуз"   },
  { lower:"школа",   upper:"Школа"   },
  { lower:"москва",  upper:"Москва"  },
  { lower:"россия",  upper:"Россия"  },
  { lower:"учитель", upper:"Учитель" },
];
const PUNCT_TASKS = [
  { before:"Природа", after:"птицы",  expected:"Природа, птицы."  },
  { before:"Лето",    after:"солнце", expected:"Лето, солнце."    },
  { before:"Кошка",   after:"собака", expected:"Кошка, собака."   },
];
const CAPS_WORDS = ["ПРИРОДА","ЗЕМЛЯ","РОССИЯ","ШКОЛА","ЗИМА"];

// ══════════════════════════════════════════════
//  СОСТОЯНИЕ
// ══════════════════════════════════════════════
let tasks=[], curIdx=0, score=0, taskResults=[], taskScored=false;
let cState={chars:[],pos:0};   // состояние задания «исправление»
let _keyFn=null;               // текущий глобальный обработчик

// ══════════════════════════════════════════════
//  УТИЛИТЫ
// ══════════════════════════════════════════════
const rnd  = a => a[Math.floor(Math.random()*a.length)];
function shuffle(a){ const b=[...a]; for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]]} return b; }

function buildTaskList(){
  return shuffle([
    {kind:"selection",  data:rnd(SEL_TASKS)  },
    {kind:"selection",  data:rnd(SEL_TASKS)  },
    {kind:"correction", data:rnd(CORR_TASKS) },
    {kind:"shift",      data:rnd(SHIFT_PAIRS)},
    {kind:"punct",      data:rnd(PUNCT_TASKS)},
    {kind:"caps",       data:{word:rnd(CAPS_WORDS)}},
  ]);
}

// ══════════════════════════════════════════════
//  СТАРТ / РЕСТАРТ
// ══════════════════════════════════════════════
function start(){
  tasks=buildTaskList(); curIdx=0; score=0; taskResults=[];
  document.getElementById('task-container').style.display='block';
  document.getElementById('results-screen').style.display='none';
  document.getElementById('prog-wrap').style.display='flex';
  renderProgress(); renderTask();
}
function restart(){ start(); }

function renderProgress(){
  const total=tasks.length;
  document.getElementById('prog-label').textContent=`Задание ${Math.min(curIdx+1,total)} из ${total}`;
  document.getElementById('prog-fill').style.width=`${curIdx/total*100}%`;
  document.getElementById('score-badge').textContent=`⭐ ${score} / 10`;
}

// ══════════════════════════════════════════════
//  РЕНДЕР ЗАДАНИЯ
// ══════════════════════════════════════════════
function renderTask(){
  if(curIdx>=tasks.length){ showResults(); return; }
  renderProgress();
  taskScored=false;
  dropKey();
  selDrag={active:false, startIdx:-1, endIdx:-1};

  const t=tasks[curIdx];
  const icons={selection:"🖱️",correction:"⌨️",shift:"⬆️",punct:"📝",caps:"🔠"};
  const names={selection:"Выделение мышью",correction:"Исправление ошибки",
               shift:"Заглавная буква (Shift)",punct:"Пробел после знака",caps:"Caps Lock"};

  let body='';
  if(t.kind==='selection')  body=tmplSelection(t.data);
  if(t.kind==='correction') body=tmplCorrection(t.data);
  if(t.kind==='shift')      body=tmplShift(t.data);
  if(t.kind==='punct')      body=tmplPunct(t.data);
  if(t.kind==='caps')       body=tmplCaps(t.data);

  document.getElementById('task-container').innerHTML=`
    <div class="card" id="main-card">
      <div class="task-badge"><span>${icons[t.kind]}</span>${names[t.kind]}</div>
      ${body}
      <div class="feedback" id="feedback">
        <span class="emo" id="fb-emo"></span>
        <span id="fb-txt"></span>
      </div>
      <button class="next-btn" id="next-btn" onclick="nextTask()">Следующее задание ➡️</button>
    </div>`;

  // пост-инит
  if(t.kind==='correction') initCorr();
  if(t.kind==='shift')      setTimeout(()=>focusInput('shift-input'),50);
  if(t.kind==='punct')      setTimeout(()=>focusInput('punct-input'),50);
  if(t.kind==='caps')       setTimeout(()=>focusInput('caps-input'),50);
}

function focusInput(id){ const el=document.getElementById(id); if(el) el.focus(); }

// ══════════════════════════════════════════════
//  ЗАДАНИЕ 1 — ВЫДЕЛЕНИЕ МЫШЬЮ (drag like Windows)
// ══════════════════════════════════════════════
let selDrag={active:false, startIdx:-1, endIdx:-1};

function tmplSelection(d){
  const words=d.sentence.split(' ');
  let spans='';
  words.forEach((w,i)=>{
    spans+=`<span class="wt" data-i="${i}" data-word="${w}">${w}</span>`;
    if(i<words.length-1) spans+=`<span class="wt-space" data-si="${i}">&nbsp;</span>`;
  });
  return `
  <div class="hint-box">
    <b>📌 Памятка:</b> Зажми <b>левую кнопку мыши</b> и протяни по нужному слову — оно выделится синим, как в Windows.
    <div class="mouse-row">
      <div class="mouse-body">
        <div class="mouse-top">
          <div class="mouse-l lit"></div>
          <div class="mouse-r"></div>
        </div>
        <div class="mouse-wheel"></div>
        <div class="mouse-bot"></div>
      </div>
      <span style="font-size:1.05rem"><b style="color:var(--primary)">Зажми и протяни</b><br>левую кнопку по слову</span>
    </div>
  </div>
  <div class="instruction">Выдели слово <span class="target">«${d.target}»</span> в предложении:</div>
  <div class="sentence-area" id="sent-area"
       onmousedown="selStart(event)"
       onmousemove="selMove(event)"
       onmouseup="selEnd(event)"
  >${spans}</div>
  <button class="check-btn" onclick="checkSel('${d.target}')">✅ Проверить</button>`;
}

function wtIndexAt(e){
  let el=e.target;
  while(el && !el.classList.contains('wt') && !el.classList.contains('sentence-area')){
    el=el.parentElement;
  }
  if(el && el.classList.contains('wt')) return parseInt(el.dataset.i);
  return -1;
}

function applyHighlight(){
  const s=Math.min(selDrag.startIdx,selDrag.endIdx);
  const e=Math.max(selDrag.startIdx,selDrag.endIdx);
  document.querySelectorAll('.wt').forEach(w=>{
    const i=parseInt(w.dataset.i);
    w.classList.toggle('hl', i>=s && i<=e);
  });
  document.querySelectorAll('.wt-space').forEach(sp=>{
    const si=parseInt(sp.dataset.si);
    sp.classList.toggle('hl', si>=s && si<e);
  });
}

function selStart(e){
  if(e.button!==0) return;
  e.preventDefault();
  const i=wtIndexAt(e);
  if(i<0) return;
  selDrag={active:true, startIdx:i, endIdx:i};
  applyHighlight();
}
function selMove(e){
  if(!selDrag.active) return;
  const i=wtIndexAt(e);
  if(i<0) return;
  selDrag.endIdx=i;
  applyHighlight();
}
function selEnd(e){
  selDrag.active=false;
}

function checkSel(target){
  const s=Math.min(selDrag.startIdx,selDrag.endIdx);
  const e=Math.max(selDrag.startIdx,selDrag.endIdx);
  if(selDrag.startIdx<0){ giveErr(`Зажми мышку и протяни по слову «${target}»`); return; }
  const words=[...document.querySelectorAll('.wt')]
    .filter(w=>{ const i=parseInt(w.dataset.i); return i>=s && i<=e; })
    .map(w=>w.dataset.word);
  const selected=words.join(' ');
  if(selected===target) giveOk("Отлично! Ты правильно выделил слово! 🎉");
  else if(!selected) giveErr(`Зажми мышку и протяни по слову «${target}»`);
  else giveErr(`Выделено: «${selected}». Нужно выделить только слово «${target}»`);
}

// ══════════════════════════════════════════════
//  ЗАДАНИЕ 2 — ИСПРАВЛЕНИЕ ОШИБКИ
// ══════════════════════════════════════════════
function tmplCorrection(d){
  cState={chars:d.wrong.split(''), pos:d.wrong.length};
  return `
  <div class="hint-box">
    <b>📌 Памятка:</b><br>
    <span class="key-chip">← Backspace</span> — удаляет букву <b>перед</b> курсором (слева)<br>
    <span class="key-chip">Delete</span> — удаляет букву <b>после</b> курсора (справа)<br>
    После удаления ты можешь <b>допечатать</b> нужную букву с клавиатуры!
  </div>
  <div class="instruction">Исправь ошибку в слове:</div>
  <div class="corr-label">Правильно: <strong>${d.correct}</strong></div>
  <div class="editable-word" id="eword" tabindex="0"
       onclick="ewClick(event)" onfocus="document.getElementById('eword').classList.add('focused')"
       onblur="document.getElementById('eword').classList.remove('focused')"
  >${corrRender()}</div>
  <div class="key-buttons">
    <button class="key-btn bs" id="btn-bs" onclick="corrBS()">⬅ Backspace</button>
    <button class="key-btn dl" id="btn-dl" onclick="corrDel()">Delete ➡</button>
  </div>
  <div style="font-size:1rem;color:var(--muted);margin-bottom:16px">
    💡 Нажми на слово, чтобы поставить курсор. Удали лишнюю букву, затем допечатай нужную.
  </div>
  <button class="check-btn" onclick="checkCorr('${d.correct}')">✅ Проверить</button>`;
}

function corrRender(){
  const {chars,pos}=cState;
  let h='';
  chars.forEach((c,i)=>{
    if(i===pos) h+=`<span class="caret"></span>`;
    h+=`<span class="ch" data-i="${i}" onclick="chClick(event,${i})">${c}</span>`;
  });
  if(pos>=chars.length) h+=`<span class="caret"></span>`;
  return h;
}
function corrRefresh(){ const el=document.getElementById('eword'); if(el){ el.innerHTML=corrRender(); el.focus(); } }

function ewClick(e){
  if(e.target===document.getElementById('eword')){
    cState.pos=cState.chars.length; corrRefresh();
  }
}
function chClick(e,i){ e.stopPropagation(); cState.pos=i; corrRefresh(); }

function corrBS(){
  flashKey('btn-bs');
  if(cState.pos>0){ cState.chars.splice(cState.pos-1,1); cState.pos--; }
  corrRefresh();
}
function corrDel(){
  flashKey('btn-dl');
  if(cState.pos<cState.chars.length){ cState.chars.splice(cState.pos,1); }
  corrRefresh();
}
function corrType(ch){
  cState.chars.splice(cState.pos,0,ch);
  cState.pos++;
  corrRefresh();
}

function flashKey(id){
  const el=document.getElementById(id); if(!el) return;
  el.classList.add('pressed');
  setTimeout(()=>el.classList.remove('pressed'),160);
}

function initCorr(){
  setTimeout(()=>{
    const el=document.getElementById('eword');
    if(el) el.focus();
  },60);
  setKey(e=>{
    // Не перехватываем, если фокус на другом поле (не должно быть)
    if(e.key==='Backspace'){ e.preventDefault(); corrBS(); return; }
    if(e.key==='Delete')   { e.preventDefault(); corrDel(); return; }
    if(e.key==='ArrowLeft'){ e.preventDefault(); if(cState.pos>0){cState.pos--;corrRefresh();} return; }
    if(e.key==='ArrowRight'){e.preventDefault(); if(cState.pos<cState.chars.length){cState.pos++;corrRefresh();} return; }
    if(e.key.length===1&&!e.ctrlKey&&!e.metaKey&&!e.altKey){
      e.preventDefault(); corrType(e.key);
    }
  });
}

function checkCorr(correct){
  const cur=cState.chars.join('');
  if(cur===correct) giveOk(`Правильно! Слово «${correct}» исправлено! 🎉`);
  else giveErr(`Пока не так... Должно получиться «${correct}». Попробуй ещё!`);
}

      <span style="font-size:1.6rem">+</span>
      <span class="key-chip" style="font-size:1rem">${d.lower[0].toUpperCase()}</span>
      <span style="font-size:1.6rem;color:var(--primary)">→</span>

    <span style="color:var(--red)">«${d.lower}»</span>

  <div class="typing-area">

function checkShift(exp){
  const v=(document.getElementById('shift-input').value||'').trim();
  if(v===exp) giveOk(`Отлично! «${exp}» — заглавная буква написана правильно! 🎉`);
  else giveErr(`Не совсем... Нужно написать «${exp}». Удержи Shift и нажми первую букву!`);
}

// ══════════════════════════════════════════════
//  ЗАДАНИЕ 4 — ПРОБЕЛ ПОСЛЕ ЗНАКА ПРЕПИНАНИЯ
// ══════════════════════════════════════════════
function tmplPunct(d){
  return `
  <div class="hint-box">
    <b>📌 Памятка:</b> После знака препинания — <b>один пробел</b>:<br>
    <div style="margin-top:10px;font-size:1.3rem;font-weight:700;font-family:monospace;">
      ${d.before},<span style="background:#fef08a;padding:2px 8px;border-radius:4px;margin:0 2px">пробел</span>${d.after}.
    </div>
    <div style="margin-top:12px;background:#fff3cd;border-radius:10px;padding:10px 14px;font-size:1rem;line-height:1.7;">
      ⌨️ <b>Как поставить запятую:</b><br>
      Убедись, что включён <b>русский язык ввода</b> (RU на панели задач).<br>
      Затем нажми <span class="key-chip">Shift (Шифт)</span> + <span class="key-chip">. (точка)</span> — получится запятая <b>,</b>
    </div>
  </div>
  <div class="instruction">Напечатай правильно: <span class="target">«${d.expected}»</span></div>
  <div class="typing-area">
    <input class="typing-input" id="punct-input" type="text"
      autocomplete="off" spellcheck="false" placeholder="Напечатай здесь…">
    <div class="typing-hint">💡 После запятой — один пробел <span class="key-chip" style="font-size:0.85rem">Пробел (Space)</span>, потом следующее слово</div>
  </div>
  <button class="check-btn" onclick="checkPunct('${d.expected}')">✅ Проверить</button>`;
}
function checkPunct(exp){
  // Normalize: trim edges, collapse multiple spaces, remove zero-width chars
  const normalize = s => s
    .trim()
    .replace(/[\u00A0\u202F\u2009\u200B]/g,' ')  // non-breaking & special spaces → normal space
    .replace(/\s+/g,' ');                          // collapse multiple spaces
  const v = normalize(document.getElementById('punct-input').value||'');
  const e = normalize(exp);
  if(v===e) giveOk("Правильно! Пробел после запятой поставлен верно! 🎉");
  else giveErr(`Не так... Должно быть «${exp}». Проверь: запятая, потом один пробел, потом слово.`);
}

// ══════════════════════════════════════════════
//  ЗАДАНИЕ 5 — CAPS LOCK
// ══════════════════════════════════════════════
function tmplCaps(d){
  return `
  <div class="hint-box">
    <b>📌 Памятка:</b><br>
    <span class="key-chip" style="font-size:1rem">Caps Lock</span> — включает режим <b>ЗАГЛАВНЫХ</b> букв.<br>
    Нажми <span class="key-chip">Caps Lock</span> → напечатай слово → снова <span class="key-chip">Caps Lock</span> чтобы выключить.
  </div>
  <div class="instruction">Напечатай слово <b>ЗАГЛАВНЫМИ</b> буквами: <span class="target">«${d.word}»</span></div>

    <input class="typing-input" id="caps-input" type="text"

function checkCaps(exp){

  if(v===exp) giveOk(`Отлично! «${exp}» — заглавные буквы набраны правильно! 🎉`);
  else giveErr(`Попробуй снова! Нужно написать «${exp}» заглавными буквами.`);
}

// ══════════════════════════════════════════════
//  ГЛОБАЛЬНЫЙ ОБРАБОТЧИК КЛАВИШ
// ══════════════════════════════════════════════
function setKey(fn){ _keyFn=fn; document.addEventListener('keydown',_keyFn); }
function dropKey(){ if(_keyFn){ document.removeEventListener('keydown',_keyFn); _keyFn=null; } }

// ══════════════════════════════════════════════
//  FEEDBACK + ОЧКИ
// ══════════════════════════════════════════════
const OK  = ["🎉","🌟","⭐","🥳","👏","😄","🦋","🏆"];
const BAD = ["💪","😊","🤔","🌈","😅","🙃"];

function giveOk(msg){
  if(taskScored) return;
  taskScored=true;
  score=Math.min(10, Math.round((score + 10/tasks.length)*10)/10);
  renderProgress();
  taskResults.push({ok:true, label:kindName(tasks[curIdx].kind)});
  showFb(true,msg);
  document.getElementById('next-btn').classList.add('show');
  document.getElementById('main-card').className='card ok';
}
function giveErr(msg){
  showFb(false,msg);
  document.getElementById('main-card').className='card bad';
}
function showFb(ok,msg){
  const fb=document.getElementById('feedback');
  fb.className=`feedback show ${ok?'ok':'bad'}`;
  document.getElementById('fb-emo').textContent=ok?rnd(OK):rnd(BAD);
  document.getElementById('fb-txt').textContent=msg;
}
function kindName(k){
  return {selection:"Выделение",correction:"Исправление",shift:"Shift (заглавная)",
          punct:"Пробел",caps:"Caps Lock"}[k]||k;
}

// ══════════════════════════════════════════════
//  НАВИГАЦИЯ
// ══════════════════════════════════════════════
function nextTask(){
  if(!taskScored) taskResults.push({ok:false,label:kindName(tasks[curIdx].kind)});
  curIdx++; dropKey(); renderTask();
}

// ══════════════════════════════════════════════
//  РЕЗУЛЬТАТЫ
// ══════════════════════════════════════════════
function showResults(){
  dropKey();
  document.getElementById('task-container').style.display='none';
  document.getElementById('results-screen').style.display='block';
  document.getElementById('prog-wrap').style.display='none';

  const s=Math.min(10,Math.round(score));
  document.getElementById('res-score').textContent=s;

  let emo,title,sub;
  if(s>=9)      {emo="🏆";title="Отлично!";    sub="Ты настоящий компьютерный гений!";}
  else if(s>=7) {emo="🌟";title="Хорошо!";     sub="Ты очень хорошо справился с заданиями!";}
  else if(s>=5) {emo="😊";title="Неплохо!";    sub="Ещё немного практики — и ты мастер!";}
  else          {emo="💪";title="Не сдавайся!";sub="Попробуй ещё раз — у тебя всё получится!";}

  document.getElementById('res-emoji').textContent=emo;
  document.getElementById('res-title').textContent=title;
  document.getElementById('res-sub').textContent=sub;

  document.getElementById('res-list').innerHTML=
    taskResults.map(r=>`
      <div class="result-item">
        <span style="font-size:1.5rem">${r.ok?'✅':'❌'}</span>
        <span>${r.label}</span>
        <span style="margin-left:auto;font-size:0.95rem;color:var(--muted)">${r.ok?'+балл':'—'}</span>
      </div>`).join('');
}

start();
</script>
