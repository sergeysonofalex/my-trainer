<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тренажер урока цифровая грамотность</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

:root {
  --bg: #f0f7ff;
  --card: #ffffff;
  --primary: #0284c7;
  --primary-light: #e0f2fe;
  --green: #15803d;
  --red: #b91c1c;
  --text: #1e293b;
  --muted: #64748b;
  --border: #cbd5e1;
  --hint-bg: #fffceb;
  --hint-border: #facc15;
  --radius: 24px;
  --shadow: 0 10px 30px rgba(0,0,0,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 15px;
}

.header { text-align: center; margin-bottom: 20px; }
.header h1 { font-size: 1.5rem; color: var(--primary); font-weight: 900; line-height: 1.2; }

.progress-wrap {
  max-width: 650px; margin: 0 auto 20px;
  background: var(--card); border-radius: 50px;
  padding: 10px 20px; box-shadow: var(--shadow);
  display: flex; align-items: center; gap: 15px;
}
.prog-bg { flex: 1; height: 14px; background: #e2e8f0; border-radius: 50px; overflow: hidden; }
.prog-fill { height: 100%; background: linear-gradient(90deg, #0ea5e9, #2563eb); width: 0%; transition: width .5s; }
.score-badge { font-weight: 900; color: #fff; background: #f59e0b; padding: 4px 14px; border-radius: 50px; min-width: 75px; text-align: center; }

.card {
  background: var(--card); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 25px;
  max-width: 650px; margin: 0 auto 100px;
  border: 4px solid transparent; transition: 0.3s;
}
.card.ok { border-color: var(--green); }
.card.bad { border-color: var(--red); }

.hint-box {
  background: var(--hint-bg); border: 2px solid var(--hint-border);
  border-radius: 18px; padding: 15px; margin-bottom: 20px;
  box-shadow: 0 4px 0 #fef08a;
}
.hint-title { font-weight: 900; color: #854d0e; margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }
.hint-warning { color: #b91c1c; font-weight: 800; margin-top: 8px; font-size: 0.95rem; display: none; border-top: 1px dashed #facc15; padding-top: 5px; }

.instruction { font-size: 1.2rem; font-weight: 800; margin-bottom: 15px; text-align: center; color: #334155; }
.instruction .target { color: var(--primary); background: var(--primary-light); padding: 2px 8px; border-radius: 8px; border: 1px solid #bae6fd; }

.sentence-area {
  font-size: 1.8rem; font-weight: 800;
  padding: 15px; background: #f8fafc;
  border-radius: 16px; border: 2px dashed var(--border);
  display: flex; flex-wrap: wrap; justify-content: center;
  cursor: default; margin-bottom: 20px; user-select: none;
}
.char { white-space: pre; border-radius: 4px; border: 1px solid transparent; }
.char.hl { background: var(--primary); color: white; }

.typing-input {
  width: 100%; font-size: 1.8rem; padding: 15px;
  border: 3px solid var(--border); border-radius: 15px;
  font-family: inherit; font-weight: 800; outline: none;
  background: #f1f5f9; margin-bottom: 20px; text-align: center;
}
.typing-input:focus { border-color: var(--primary); background: #fff; }

.editable-word {
  font-size: 2.2rem; font-weight: 900; background: #fff;
  padding: 15px; border-radius: 15px; margin-bottom: 15px;
  border: 3px solid var(--border); display: flex; justify-content: center;
  letter-spacing: 2px; cursor: text; outline: none;
}
.ch-span { position: relative; padding: 0 2px; display: inline-block; border-radius: 4px; }
.ch-span:hover { background: #e0f2fe; }
.caret { display: inline-block; width: 4px; height: 2.2rem; background: var(--primary); animation: blink 1s infinite; vertical-align: middle; }
@keyframes blink { 50% { opacity: 0; } }

.btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
.key-btn { flex: 1; padding: 12px; border: none; border-radius: 12px; background: #f1f5f9; border-bottom: 4px solid #cbd5e1; font-weight: 800; cursor: pointer; color: #475569; font-size: 0.9rem; }

.check-btn { width: 100%; padding: 18px; border: none; border-radius: 50px; background: var(--primary); color: white; font-size: 1.2rem; font-weight: 900; cursor: pointer; box-shadow: 0 4px 0 #0369a1; }
.next-btn { width: 100%; padding: 18px; border: none; border-radius: 50px; background: var(--green); color: white; font-size: 1.2rem; font-weight: 900; cursor: pointer; display: none; margin-top: 15px; box-shadow: 0 4px 0 #14532d; }

.feedback { padding: 15px; border-radius: 15px; margin-top: 15px; display: none; font-weight: 800; text-align: center; }
.feedback.ok { display: block; background: #dcfce7; color: #166534; }
.feedback.err { display: block; background: #fee2e2; color: #991b1b; }

#results-screen { display: none; text-align: center; max-width: 600px; margin: 0 auto; }
.key-name { color: #0284c7; font-weight: 900; }
</style>
</head>
<body>

<div class="header">
  <h1>🚀 Тренажер урока «Цифровая грамотность» 🇰🇿</h1>
</div>

<div class="progress-wrap" id="prog-wrap">
  <div class="score-badge" id="score-badge">⭐ 0</div>
  <div class="prog-bg"><div class="prog-fill" id="prog-fill"></div></div>
  <div style="font-weight:900; color:var(--muted); font-size: 0.9rem; min-width: 50px; text-align: right;" id="prog-label">1 / 30</div>
</div>

<div id="task-container"></div>

<div id="results-screen">
  <div class="card">
    <h2 style="font-size:2.5rem">Занятие окончено! 🏆</h2>
    <p style="margin: 20px 0; font-size: 1.3rem;">Ты настоящий <b>Адал Азамат</b>!</p>
    <div style="font-size:3.5rem; font-weight:900; color:var(--primary); margin-bottom:20px" id="res-score"></div>
    <button class="check-btn" onclick="location.reload()">🔄 Начать сначала</button>
  </div>
</div>

<script>
// --- ПУЛ ЗАДАНИЙ (30 ШТУК) ---
const SEL_DATA = [
  { s: "Астана — столица.", t: "Астана" },
  { s: "Я люблю Родину.", t: "Родину" },
  { s: "Честный ученик.", t: "Честный" },
  { s: "Мышка на коврике.", t: "Мышка" },
  { s: "Экран монитора.", t: "Экран" },
  { s: "Верный товарищ.", t: "Верный" }
];
const CORR_DATA = [
  { w: "компютер", c: "компьютер" },
  { w: "казакстан", c: "Казахстан" },
  { w: "програма", c: "программа" },
  { w: "ошипка", c: "ошибка" },
  { w: "интирнет", c: "интернет" },
  { w: "клавитура", c: "клавиатура" }
];
const SHIFT_DATA = [
  { l: "абай", u: "Абай" },
  { l: "алматы", u: "Алматы" },
  { l: "каспий", u: "Каспий" },
  { l: "тенге", u: "Тенге" },
  { l: "степь", u: "Степь" },
  { l: "батыр", u: "Батыр" }
];
const PUNCT_DATA = [
  { exp: "Семья, труд." },
  { exp: "Урок, класс." },
  { exp: "Файл, папка." },
  { exp: "Мир, дружба." },
  { exp: "Правда, честь." },
  { exp: "Свет, экран." }
];
const CAPS_DATA = ["ИНТЕРНЕТ", "КАЗАХСТАН", "ПОРЯДОК", "СПРАВЕДЛИВОСТЬ", "КЛАВИАТУРА", "ПАМЯТЬ"];

let tasks = [], curIdx = 0, score = 0;
let selDrag = { active: false, start: -1, end: -1 };
let corrState = { chars: [], pos: 0 };
let usedShiftForFirstLetter = false;

function initGame() {
  let pool = [];
  for(let i=0; i<6; i++) pool.push({ type: 'sel', data: SEL_DATA[i] });
  for(let i=0; i<6; i++) pool.push({ type: 'corr', data: CORR_DATA[i] });
  for(let i=0; i<6; i++) pool.push({ type: 'shift', data: SHIFT_DATA[i] });
  for(let i=0; i<6; i++) pool.push({ type: 'punct', data: PUNCT_DATA[i] });
  for(let i=0; i<6; i++) pool.push({ type: 'caps', data: CAPS_DATA[i] });
  tasks = pool.sort(() => Math.random() - 0.5);
  renderTask();
}

window.addEventListener('keydown', (e) => {
  const t = tasks[curIdx];
  const isCaps = e.getModifierState('CapsLock');
  const warn = document.getElementById('caps-warn');
  
  if (warn) {
    warn.style.display = (isCaps && t.type !== 'caps') ? 'block' : 'none';
  }

  // Блокировка Caps Lock для заглавных букв
  if (t && (t.type === 'shift' || t.type === 'punct')) {
    const input = document.getElementById('t-in');
    if (input && input.value.length === 0 && e.key.length === 1) {
       const isUpper = e.key !== e.key.toLowerCase() && e.key === e.key.toUpperCase();
       if (isUpper && !e.shiftKey) {
          e.preventDefault();
          fail("Стоп! 🛑 Для одной заглавной буквы используй <b>Shift (Шифт)</b>, а не Caps Lock (Капс Лок)!");
          return;
       }
       if (isUpper && e.shiftKey) {
          usedShiftForFirstLetter = true;
       }
    }
  }

  if (tasks[curIdx] && tasks[curIdx].type === 'corr') {
    if (e.key === 'Backspace') { e.preventDefault(); doBS(); }
    else if (e.key === 'Delete') { e.preventDefault(); doDel(); }
    else if (e.key.length === 1) { e.preventDefault(); doType(e.key); }
  }
});

function renderTask() {
  const t = tasks[curIdx];
  const container = document.getElementById('task-container');
  document.getElementById('prog-label').textContent = `${curIdx + 1} / 30`;
  document.getElementById('prog-fill').style.width = `${(curIdx / 30) * 100}%`;
  document.getElementById('score-badge').textContent = `⭐ ${score}`;
  usedShiftForFirstLetter = false;

  let html = '';
  
  if (t.type === 'sel') {
    html = `
      <div class="card" id="task-card">
        <div class="hint-box">
          <div class="hint-title">🖱️ МЫШКА: ВЫДЕЛЕНИЕ</div>
          <div>Зажми левую кнопку мыши и веди по буквам. Оно станет синим! 🔵</div>
        </div>
        <div class="instruction">Выдели слово <span class="target">«${t.data.t}»</span>:</div>
        <div class="sentence-area" onmousedown="sStart(event)" onmousemove="sMove(event)" onmouseup="sEnd()" onmouseleave="sEnd()">
          ${t.data.s.split('').map((c,i)=>`<span class="char" data-idx="${i}">${c}</span>`).join('')}
        </div>
        <button class="check-btn" onclick="checkSel()">✅ Проверить ответ</button>
        <div class="feedback" id="fb"></div>
        <button class="next-btn" id="next-btn" onclick="next()">Дальше ➡️</button>
      </div>`;
  } else if (t.type === 'corr') {
    corrState = { chars: t.data.w.split(''), pos: t.data.w.length };
    html = `
      <div class="card" id="task-card">
        <div class="hint-box">
          <div class="hint-title">⌨️ КЛАВИАТУРА: ПРАВКА</div>
          <div>Нажми мышкой на букву и используй кнопки <span class="key-name">Backspace (Бэкспейс)</span> или <span class="key-name">Delete (Делит)</span>.</div>
        </div>
        <div class="instruction">Исправь ошибку (напиши: <b>${t.data.c}</b>):</div>
        <div class="editable-word" id="ew" tabindex="0" onclick="wordClick(event)">${renderCorr()}</div>
        <div class="btn-group">
          <button class="key-btn" onclick="doBS()">⬅ Backspace (Бэкспейс)</button>
          <button class="key-btn" onclick="doDel()">Delete (Делит) ➡</button>
        </div>
        <button class="check-btn" onclick="checkCorr('${t.data.c}')">✅ Проверить ответ</button>
        <div class="feedback" id="fb"></div>
        <button class="next-btn" id="next-btn" onclick="next()">Дальше ➡️</button>
      </div>`;
  } else if (t.type === 'shift') {
    html = `
      <div class="card" id="task-card">
        <div class="hint-box">
          <div class="hint-title">⌨️ КЛАВИАТУРА: ЗАГЛАВНАЯ БУКВА</div>
          <div>Удерживай клавишу <span class="key-name">Shift (Шифт)</span> и нажми букву. 👆</div>
          <span class="hint-warning" id="caps-warn" style="display:block">⚠️ ВАЖНО: Выключи Caps Lock (Капс Лок)! Для одной буквы он не нужен.</span>
        </div>
        <div class="instruction">Напиши с заглавной буквы: <span class="target">«${t.data.u}»</span></div>
        <input type="text" class="typing-input" id="t-in" autocomplete="off">
        <button class="check-btn" onclick="checkIn('${t.data.u}')">✅ Проверить ответ</button>
        <div class="feedback" id="fb"></div>
        <button class="next-btn" id="next-btn" onclick="next()">Дальше ➡️</button>
      </div>`;
  } else if (t.type === 'caps') {
    html = `
      <div class="card" id="task-card">
        <div class="hint-box">
          <div class="hint-title">⌨️ КЛАВИАТУРА: БОЛЬШИЕ БУКВЫ</div>
          <div>Нажми кнопку <span class="key-name">Caps Lock (Капс Лок)</span>. 🔠</div>
          <span class="hint-warning" style="display:block; color:#15803d; border-color:#86efac">💡 СОВЕТ: Лампочка Caps Lock (Капс Лок) должна гореть!</span>
        </div>
        <div class="instruction">Напиши БОЛЬШИМИ буквами: <span class="target">«${t.data}»</span></div>
        <input type="text" class="typing-input" id="t-in" autocomplete="off">
        <button class="check-btn" onclick="checkIn('${t.data}')">✅ Проверить ответ</button>
        <div class="feedback" id="fb"></div>
        <button class="next-btn" id="next-btn" onclick="next()">Дальше ➡️</button>
      </div>`;
  } else if (t.type === 'punct') {
    html = `
      <div class="card" id="task-card">
        <div class="hint-box">
          <div class="hint-title">⌨️ КЛАВИАТУРА: ЗАПЯТАЯ И ТОЧКА</div>
          <div>Запятая: <span class="key-name">Shift (Шифт)</span> + <span class="key-name">. (Точка)</span>. <br>Не забудь <b>Space (Пробел)</b> после запятой! ✍️</div>
          <span class="hint-warning" id="caps-warn">⚠️ Выключи Caps Lock (Капс Лок)! Лампочка не должна гореть.</span>
        </div>
        <div class="instruction">Перепиши правильно: <span class="target">«${t.data.exp}»</span></div>
        <input type="text" class="typing-input" id="t-in" autocomplete="off">
        <button class="check-btn" onclick="checkIn('${t.data.exp}')">✅ Проверить ответ</button>
        <div class="feedback" id="fb"></div>
        <button class="next-btn" id="next-btn" onclick="next()">Дальше ➡️</button>
      </div>`;
  }
  
  container.innerHTML = html;
  const tin = document.getElementById('t-in');
  if(tin) tin.focus();
}

function sStart(e) { if(e.target.dataset.idx) { selDrag = { active: true, start: parseInt(e.target.dataset.idx), end: parseInt(e.target.dataset.idx) }; updateHl(); } }
function sMove(e) { if(selDrag.active && e.target.dataset.idx) { selDrag.end = parseInt(e.target.dataset.idx); updateHl(); } }
function sEnd() { selDrag.active = false; }
function updateHl() {
  const min = Math.min(selDrag.start, selDrag.end), max = Math.max(selDrag.start, selDrag.end);
  document.querySelectorAll('.char').forEach(c => c.classList.toggle('hl', parseInt(c.dataset.idx) >= min && parseInt(c.dataset.idx) <= max));
}

function checkSel() {
  const t = tasks[curIdx].data;
  const min = Math.min(selDrag.start, selDrag.end), max = Math.max(selDrag.start, selDrag.end);
  const selected = t.s.substring(min, max + 1).trim().toLowerCase();
  if(selected === t.t.toLowerCase()) win(); 
  else fail("Неверно выделено. Выдели только слово «" + t.t + "» 🤔");
}

function renderCorr() {
  let h = '';
  corrState.chars.forEach((c, i) => {
    if(i === corrState.pos) h += '<span class="caret"></span>';
    h += `<span class="ch-span" data-idx="${i}">${c}</span>`;
  });
  if(corrState.pos === corrState.chars.length) h += '<span class="caret"></span>';
  return h;
}
function wordClick(e) {
  if(e.target.dataset.idx !== undefined) corrState.pos = parseInt(e.target.dataset.idx);
  else corrState.pos = corrState.chars.length;
  refreshCorr();
}
function doType(char) { corrState.chars.splice(corrState.pos, 0, char); corrState.pos++; refreshCorr(); }
function doBS() { if(corrState.pos > 0) { corrState.chars.splice(corrState.pos-1, 1); corrState.pos--; refreshCorr(); } }
function doDel() { if(corrState.pos < corrState.chars.length) { corrState.chars.splice(corrState.pos, 1); refreshCorr(); } }
function refreshCorr() { document.getElementById('ew').innerHTML = renderCorr(); }

function checkCorr(c) { 
  if(corrState.chars.join('').toLowerCase() === c.toLowerCase()) win(); 
  else fail("Слово исправлено неверно. Посмотри на образец! 🤔"); 
}

function checkIn(exp) {
  const val = document.getElementById('t-in').value.trim();
  const type = tasks[curIdx].type;

  if ((type === 'shift' || type === 'punct') && val.length > 0) {
      if (val[0] === val[0].toUpperCase() && !usedShiftForFirstLetter) {
          fail("Ты использовал Caps Lock (Капс Лок)! ❌ Выключи его и напиши первую букву с зажатым <b>Shift (Шифт)</b>.");
          return;
      }
  }

  if(val === exp) {
    win();
  } else {
    if (exp.endsWith('.') && !val.endsWith('.')) {
      fail("Ты забыл поставить точку в конце! 📍");
    } else if (exp.includes(',') && !val.includes(',')) {
      fail("Кажется, ты пропустил запятую! ✍️");
    } else if (val.toLowerCase() === exp.toLowerCase()) {
      fail("Ошибка в регистре! Проверь БОЛЬШИЕ и маленькие буквы. 🔠");
    } else if (val.replace(/\s/g, '') === exp.replace(/\s/g, '')) {
      fail("Забыл поставить Space (Пробел)! Проверь внимательно. ✍️");
    } else {
      fail("Ошибка в буквах! Напиши точно так же, как в образце. 🤔");
    }
  }
}

function win() {
  score++; document.getElementById('fb').className = "feedback ok";
  document.getElementById('fb').innerHTML = "Правильно! Ты молодец! 🌟✨";
  document.getElementById('task-card').classList.add('ok');
  document.getElementById('next-btn').style.display = 'block';
}

function fail(m) {
  const fb = document.getElementById('fb');
  fb.className = "feedback err"; 
  fb.innerHTML = m;
  document.getElementById('task-card').classList.add('bad');
  setTimeout(() => document.getElementById('task-card').classList.remove('bad'), 400);
}

function next() {
  curIdx++;
  if(curIdx < 30) renderTask();
  else {
    document.getElementById('task-container').style.display = 'none';
    document.getElementById('prog-wrap').style.display = 'none';
    document.getElementById('results-screen').style.display = 'block';
    document.getElementById('res-score').textContent = `⭐ ${score} / 30`;
  }
}

initGame();
</script>
</body>
</html>
