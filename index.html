<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Компьютерная грамота — 2 класс</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
:root{
  --bg:#eef4ff;--card:#fff;--primary:#2563eb;--plight:#dbeafe;
  --green:#16a34a;--glight:#dcfce7;--red:#dc2626;--rlight:#fee2e2;
  --orange:#ea580c;--text:#1e293b;--muted:#64748b;--border:#cbd5e1;
  --radius:16px;--shadow:0 4px 20px rgba(37,99,235,.10);
  --hint-bg:#eff6ff;--hint-brd:#93c5fd;
  --warn-bg:#fffbeb;--warn-brd:#fbbf24;
  --task-bg:#f0fdf4;--task-brd:#86efac;
  --tip-bg:#fdf4ff;--tip-brd:#d8b4fe;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);min-height:100vh;color:var(--text);padding:16px 14px 50px;font-size:17px;}

/* ── HEADER ── */
.hdr{text-align:center;margin-bottom:16px;}
.hdr h1{font-size:1.9rem;font-weight:900;color:var(--primary);}
.hdr p{font-size:1rem;color:var(--muted);margin-top:3px;}

/* ── CAPS BANNER ── */
#caps-banner{
  max-width:700px;margin:0 auto 12px;background:#fff7ed;border:2px solid #f97316;
  border-radius:12px;padding:10px 16px;font-size:1rem;font-weight:700;color:#7c2d12;
  display:none;align-items:center;gap:10px;line-height:1.5;
}
#caps-banner.show{display:flex;}

/* ── LEVEL BAR ── */
.level-bar{
  max-width:700px;margin:0 auto 14px;background:var(--card);border-radius:50px;
  padding:9px 18px;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px;
}
.lv-label{font-size:0.9rem;font-weight:800;color:var(--muted);white-space:nowrap;}
.lv-bg{flex:1;height:10px;background:var(--border);border-radius:50px;overflow:hidden;}
.lv-fill{height:100%;border-radius:50px;transition:width .4s;}
.lv1 .lv-fill{background:linear-gradient(90deg,#22c55e,#16a34a);}
.lv2 .lv-fill{background:linear-gradient(90deg,#f59e0b,#d97706);}
.lv3 .lv-fill{background:linear-gradient(90deg,#ef4444,#dc2626);}
.lv-score{font-weight:800;font-size:0.95rem;padding:2px 12px;border-radius:50px;white-space:nowrap;}
.lv1 .lv-score{background:#dcfce7;color:#15803d;}
.lv2 .lv-score{background:#fef3c7;color:#92400e;}
.lv3 .lv-score{background:#fee2e2;color:#b91c1c;}

/* ── CARD ── */
.card{
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:20px 22px 18px;max-width:700px;margin:0 auto 16px;
  border:3px solid transparent;transition:border-color .3s;
}
.card.ok{border-color:var(--green);}
.card.bad{border-color:var(--red);}

/* ── TASK BADGE ── */
.task-badge{
  display:flex;align-items:center;gap:10px;
  background:linear-gradient(135deg,var(--primary),#7c3aed);
  color:#fff;font-weight:900;font-size:1.45rem;
  padding:12px 20px;border-radius:14px;margin-bottom:16px;
  box-shadow:0 3px 12px rgba(37,99,235,.22);
}
.task-badge span{font-size:1.7rem;}
.task-badge small{font-size:0.8rem;opacity:.8;font-weight:700;margin-left:auto;}

/* ── HINT MODE BADGE ── */
.hint-mode-tag{
  display:inline-flex;align-items:center;gap:6px;
  background:#fef9c3;border:2px solid #fbbf24;border-radius:50px;
  color:#92400e;font-size:0.9rem;font-weight:800;
  padding:4px 14px;margin-bottom:12px;
}
.solo-mode-tag{
  display:inline-flex;align-items:center;gap:6px;
  background:#dcfce7;border:2px solid #86efac;border-radius:50px;
  color:#14532d;font-size:0.9rem;font-weight:800;
  padding:4px 14px;margin-bottom:12px;
}

/* ── SECTION BLOCKS ── */
.sec-hint{background:var(--hint-bg);border:2px solid var(--hint-brd);border-radius:12px;padding:14px 16px;margin-bottom:14px;font-size:1rem;line-height:1.75;}
.sec-hint b{color:#1d4ed8;}
.sec-warn{background:var(--warn-bg);border:2px solid var(--warn-brd);border-radius:12px;padding:12px 16px;margin-bottom:14px;font-size:1rem;line-height:1.75;}
.sec-warn b{color:#92400e;}
.sec-task{background:var(--task-bg);border:2px solid var(--task-brd);border-radius:12px;padding:16px 18px;margin-bottom:14px;}
.typing-hint{font-size:0.95rem;color:#581c87;background:var(--tip-bg);border:1px solid var(--tip-brd);border-radius:10px;padding:9px 14px;margin-top:10px;line-height:1.65;}
.divider{height:1px;background:linear-gradient(90deg,transparent,#c7d2e8 30%,#c7d2e8 70%,transparent);margin:12px 0;}

/* ── INSTRUCTION ── */
.instruction{font-size:1.5rem;font-weight:900;color:var(--text);line-height:1.45;margin-bottom:12px;}
.instruction .target{color:var(--primary);}

/* ── KEY CHIP ── */
.kc{display:inline-block;background:#fff;border:2px solid #94a3b8;border-bottom:4px solid #64748b;border-radius:6px;padding:1px 9px;font-weight:800;font-size:0.88rem;color:var(--text);margin:0 2px;vertical-align:middle;}

/* ── MOUSE ILLUSTRATION ── */
.mouse-row{display:flex;align-items:center;gap:12px;margin-top:10px;flex-wrap:wrap;}
.mouse-body{width:48px;height:74px;background:#e2e8f0;border-radius:24px 24px 14px 14px;border:2px solid #94a3b8;display:flex;flex-direction:column;overflow:hidden;position:relative;flex-shrink:0;}
.mouse-top{display:flex;height:34px;border-bottom:2px solid #94a3b8;}
.mouse-l{flex:1;border-right:1px solid #94a3b8;border-radius:22px 0 0 0;transition:background .2s;}
.mouse-r{flex:1;border-radius:0 22px 0 0;transition:background .2s;}
.mouse-l.lit{background:var(--primary);}
.mouse-r.lit{background:#f97316;}
.mouse-wheel{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:6px;height:14px;background:#94a3b8;border-radius:3px;}
.mouse-bot{flex:1;}

/* ── SELECTION ── */
.sentence-area{font-size:1.9rem;font-weight:800;line-height:2.3;user-select:none;cursor:default;padding:4px 2px;}
.wt-ch{display:inline;border-radius:1px;transition:background .04s,color .04s;}
.wt-ch.hl{background:#2563eb;color:#fff;}
.wt-sp{display:inline;}
.wt-sp.hl{background:#2563eb;color:#fff;}

/* ── CORRECTION ── */
.corr-correct{font-size:1.05rem;color:var(--muted);margin-bottom:8px;}
.corr-correct strong{font-size:1.45rem;color:var(--green);letter-spacing:2px;}
.editable-word{
  display:inline-flex;align-items:center;flex-wrap:wrap;
  font-size:2.2rem;font-weight:800;background:var(--bg);
  border:2px solid var(--border);border-radius:12px;
  padding:10px 18px;min-width:200px;cursor:text;
  letter-spacing:3px;margin-bottom:12px;
  user-select:none;outline:none;transition:border-color .2s;
}
.editable-word.focused{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.13);}
.caret{display:inline-block;width:3px;height:2rem;background:var(--primary);border-radius:2px;animation:blink 1s step-end infinite;vertical-align:middle;margin:0 1px;}
@keyframes blink{50%{opacity:0;}}
.key-buttons{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.key-btn{background:#fff;border:2px solid var(--border);border-bottom:5px solid #94a3b8;border-radius:10px;padding:8px 16px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;transition:transform .1s,border-bottom-width .1s;color:var(--text);}
.key-btn:active,.key-btn.pressed{transform:translateY(3px);border-bottom-width:2px;}
.key-btn.bs{color:var(--red);border-color:#fca5a5;border-bottom-color:var(--red);}
.key-btn.dl{color:var(--orange);border-color:#fdba74;border-bottom-color:var(--orange);}

/* ── TYPING INPUT ── */
.input-row{position:relative;display:flex;align-items:center;gap:0;}
.input-arrow{display:flex;flex-direction:column;align-items:center;margin-right:8px;flex-shrink:0;}
.input-arrow .arr-txt{font-size:0.75rem;font-weight:800;color:var(--primary);writing-mode:vertical-rl;transform:rotate(180deg);margin-bottom:3px;letter-spacing:1px;}
.input-arrow .arr-ico{font-size:1.4rem;line-height:1;}
.input-rel{position:relative;flex:1;}
.typing-input{width:100%;font-family:'Nunito',sans-serif;font-size:1.75rem;font-weight:800;padding:11px 16px;border:2px solid var(--border);border-radius:12px;outline:none;background:var(--bg);color:var(--text);transition:border-color .2s;letter-spacing:1px;}
.typing-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.13);}

/* ── CAPS OVERLAY ── */
.caps-overlay{display:none;position:absolute;inset:0;background:rgba(255,255,255,.88);border-radius:12px;align-items:center;justify-content:center;font-size:1rem;font-weight:800;color:#92400e;text-align:center;padding:10px;border:2px solid #f97316;z-index:10;}
.caps-overlay.show{display:flex;}

/* ── BUTTONS ── */
.check-btn{background:linear-gradient(135deg,var(--primary),#7c3aed);color:#fff;border:none;border-radius:50px;padding:12px 32px;font-family:'Nunito',sans-serif;font-size:1.1rem;font-weight:800;cursor:pointer;box-shadow:0 4px 14px rgba(37,99,235,.22);transition:transform .15s;}
.check-btn:hover{transform:translateY(-2px);}
.next-btn{background:linear-gradient(135deg,var(--green),#15803d);color:#fff;border:none;border-radius:50px;padding:12px 28px;font-family:'Nunito',sans-serif;font-size:1.1rem;font-weight:800;cursor:pointer;margin-top:10px;display:none;box-shadow:0 4px 14px rgba(22,163,74,.22);transition:transform .15s;}
.next-btn.show{display:inline-block;}
.next-btn:hover{transform:translateY(-2px);}

/* ── FEEDBACK ── */
.sec-feedback{margin-top:12px;padding:14px 16px;border-radius:12px;font-size:1.1rem;font-weight:700;display:none;align-items:center;gap:12px;line-height:1.45;}
.sec-feedback.show{display:flex;}
.sec-feedback.ok{background:var(--glight);color:#14532d;}
.sec-feedback.bad{background:var(--rlight);color:#7f1d1d;}
.sec-feedback .emo{font-size:2rem;flex-shrink:0;}

/* ── CLICK TASK ── */
.desktop-area{background:linear-gradient(160deg,#1a6bd4,#1e40af);border-radius:12px;padding:24px 16px 18px;display:flex;align-items:center;justify-content:center;min-height:190px;position:relative;box-shadow:inset 0 2px 10px rgba(0,0,0,.22);user-select:none;gap:16px;flex-wrap:wrap;}
.desktop-hint-bar{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.35);color:#fff;font-size:0.82rem;font-weight:700;padding:3px 14px;border-radius:50px;white-space:nowrap;}
.desk-icon{display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;padding:12px 16px;border-radius:12px;transition:background .1s;-webkit-tap-highlight-color:transparent;}
.desk-icon:hover{background:rgba(255,255,255,.15);}
.desk-icon-img{font-size:4.5rem;line-height:1;filter:drop-shadow(0 3px 6px rgba(0,0,0,.3));transition:transform .08s;pointer-events:none;}
.desk-icon:active .desk-icon-img{transform:scale(.9);}
.desk-icon-lbl{color:#fff;font-size:0.95rem;font-weight:800;text-align:center;text-shadow:0 1px 4px rgba(0,0,0,.7);pointer-events:none;}
@keyframes clickFlash{0%{background:rgba(255,255,255,0);}40%{background:rgba(255,255,255,.5);}100%{background:rgba(255,255,255,0);}}
.desk-icon.flashing{animation:clickFlash .2s ease;}
.click-dots{display:flex;gap:8px;justify-content:center;margin:12px 0 4px;}
.click-dot{width:20px;height:20px;border-radius:50%;background:#d1d5db;border:2px solid #9ca3af;transition:all .15s;}
.click-dot.done{background:var(--green);border-color:#15803d;transform:scale(1.2);}
.click-msg{text-align:center;font-size:1.05rem;font-weight:800;min-height:1.7em;color:var(--text);}

/* ── RCLICK TASK ── */
.rclick-area{position:relative;background:linear-gradient(135deg,#f0f9ff,#e0f2fe);border:2px solid #bae6fd;border-radius:12px;min-height:180px;display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap;padding:14px;overflow:visible;}
.rclick-img{display:flex;flex-direction:column;align-items:center;gap:7px;padding:14px 18px;border-radius:12px;cursor:context-menu;transition:background .12s,opacity .4s;border:3px dashed transparent;user-select:none;}
.rclick-img:hover{background:rgba(37,99,235,.08);border-color:#93c5fd;}
.rclick-copy{display:flex;flex-direction:column;align-items:center;gap:7px;padding:14px 18px;border-radius:12px;background:rgba(22,163,74,.08);border:3px dashed #86efac;user-select:none;animation:popIn .35s ease;}
.rclick-empty{display:none;flex-direction:column;align-items:center;justify-content:center;width:130px;height:130px;border-radius:12px;border:3px dashed #f97316;background:rgba(249,115,22,.06);cursor:context-menu;transition:background .12s;user-select:none;}
.rclick-empty:hover{background:rgba(249,115,22,.12);}
.rclick-empty-hint{font-size:0.88rem;font-weight:800;color:#92400e;text-align:center;padding:8px;line-height:1.4;}
.rclick-emoji{font-size:5rem;line-height:1;filter:drop-shadow(0 4px 8px rgba(0,0,0,.12));}
.rclick-lbl{font-size:1rem;font-weight:800;color:var(--text);}
@keyframes popIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.ctx-menu{position:absolute;z-index:200;background:#fff;border:1px solid #d1d5db;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.18);min-width:148px;overflow:hidden;animation:ctxPop .12s ease;}
@keyframes ctxPop{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.ctx-item{padding:10px 16px;font-size:1rem;font-weight:700;cursor:pointer;color:var(--text);transition:background .1s;border-bottom:1px solid #f1f5f9;}
.ctx-item:last-child{border-bottom:none;}
.ctx-item:hover{background:#eff6ff;color:var(--primary);}
.ctx-item.ctx-highlight{background:#fef9c3;}

/* ── DRAG TASK ── */
.drag-area{
  background:linear-gradient(160deg,#1a3a6b,#1e3a8a);
  border-radius:12px;padding:24px 16px 20px;
  display:flex;align-items:center;justify-content:space-around;
  min-height:200px;position:relative;gap:12px;flex-wrap:wrap;
  box-shadow:inset 0 2px 10px rgba(0,0,0,.25);user-select:none;
  overflow:visible;
}
.drag-file{
  display:flex;flex-direction:column;align-items:center;gap:7px;
  cursor:grab;padding:12px 16px;border-radius:12px;
  transition:transform .1s,opacity .2s,box-shadow .1s;
  border:3px dashed transparent;
}
.drag-file.dragging{
  opacity:.45;cursor:grabbing;
  transform:scale(.92);
}
.drag-file.placed{opacity:.3;pointer-events:none;}
.drag-folder{
  display:flex;flex-direction:column;align-items:center;gap:7px;
  padding:14px 18px;border-radius:12px;
  border:3px dashed rgba(255,255,255,.3);
  transition:border-color .15s,background .15s,transform .15s;
}
.drag-folder.over{
  border-color:#fbbf24;background:rgba(251,191,36,.18);
  transform:scale(1.06);
}
.drag-folder.success{
  border-color:#86efac;background:rgba(134,239,172,.2);
}
.drag-icon-img{font-size:4.5rem;line-height:1;filter:drop-shadow(0 3px 6px rgba(0,0,0,.3));pointer-events:none;}
.drag-icon-lbl{color:#fff;font-size:0.95rem;font-weight:800;text-align:center;text-shadow:0 1px 4px rgba(0,0,0,.7);pointer-events:none;}
/* папка с файлом внутри */
.folder-with-file{position:relative;display:inline-block;}
.folder-inner-file{
  position:absolute;bottom:6px;left:50%;transform:translateX(-50%);
  font-size:1.6rem;line-height:1;
  display:none;animation:popIn .3s ease;
}
.drag-folder.success .folder-inner-file{display:block;}
.drag-arrow{
  color:rgba(255,255,255,.5);font-size:2rem;flex-shrink:0;
  animation:arrowPulse 1.4s ease-in-out infinite;
}
@keyframes arrowPulse{0%,100%{opacity:.4;transform:translateX(0);}50%{opacity:1;transform:translateX(6px);}}
.drag-msg{text-align:center;font-size:1.05rem;font-weight:800;min-height:1.7em;color:var(--text);margin-top:10px;}
/* Перетаскиваемый призрак */
#drag-ghost{
  position:fixed;pointer-events:none;z-index:9999;
  display:flex;flex-direction:column;align-items:center;
  opacity:.85;transform:translate(-50%,-50%);
  transition:none;
}

/* ── ENTER TASK ── */
.enter-area{margin-bottom:12px;}
.enter-preview{
  background:#1e293b;color:#e2e8f0;border-radius:12px;
  padding:14px 18px;font-family:'Courier New',monospace;font-size:1.4rem;font-weight:700;
  margin-bottom:12px;min-height:80px;line-height:1.8;letter-spacing:1px;
  white-space:pre-wrap;border:2px solid #334155;
}
.enter-preview .cursor-line{display:inline-block;width:10px;height:1.4rem;background:#60a5fa;vertical-align:middle;animation:blink 1s step-end infinite;margin-left:2px;}
.enter-textarea{
  width:100%;font-family:'Nunito',sans-serif;font-size:1.5rem;font-weight:800;
  padding:12px 16px;border:2px solid var(--border);border-radius:12px;
  outline:none;background:var(--bg);color:var(--text);resize:none;
  transition:border-color .2s;line-height:1.7;min-height:100px;
}
.enter-textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.13);}
.key-enter{
  display:inline-block;background:#fff;border:2px solid #94a3b8;border-bottom:5px solid #475569;
  border-radius:8px;padding:3px 14px;font-weight:900;font-size:1rem;color:var(--text);
  vertical-align:middle;letter-spacing:.5px;
}

/* ── WORD TASK ── */
.word-sim{
  border:1px solid #adb5bd;border-radius:8px;overflow:hidden;
  font-family:'Segoe UI',Arial,sans-serif;font-size:13px;
  box-shadow:0 4px 16px rgba(0,0,0,.15);user-select:none;
  max-width:640px;margin:0 auto;
}
/* Title bar */
.word-titlebar{
  background:#2b579a;color:#fff;padding:6px 14px;
  display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;
}
.word-titlebar .wt-icon{font-size:1rem;}
.word-titlebar .wt-title{flex:1;}
.word-titlebar .wt-btns{display:flex;gap:4px;}
.wt-btn{width:22px;height:22px;border-radius:3px;border:none;cursor:default;font-size:11px;
  font-weight:700;color:#fff;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;}
.wt-btn.close{background:#e81123;}
/* Ribbon */
.word-ribbon{background:#f3f2f1;border-bottom:1px solid #d0cece;}
.word-tabs{display:flex;border-bottom:1px solid #c8c6c4;}
.word-tab{
  padding:6px 14px;font-size:12px;color:#605e5c;cursor:pointer;
  border-bottom:3px solid transparent;transition:all .12s;font-weight:600;
}
.word-tab:hover{background:#e8e6e4;color:#323130;}
.word-tab.active{color:#2b579a;border-bottom-color:#2b579a;background:#fff;}
.word-tab.clickable{color:#2b579a;font-weight:700;}
.word-tab.need-click-tab{
  color:#92400e;font-weight:900;background:#fff3cd;border-bottom-color:#f59e0b;
  animation:needPulse 1.2s ease-in-out infinite;
}
/* Ribbon content */
.ribbon-content{display:flex;align-items:flex-start;gap:2px;padding:4px 8px;min-height:70px;}
.ribbon-group{display:flex;flex-direction:column;align-items:center;border-right:1px solid #d0cece;padding:2px 10px 2px 4px;margin-right:2px;}
.ribbon-group:last-child{border-right:none;}
.rg-label{font-size:10px;color:#605e5c;margin-top:3px;text-align:center;}
.ribbon-btn{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:4px 8px;border-radius:4px;cursor:pointer;border:2px solid transparent;
  transition:background .12s,border-color .12s;min-width:44px;
}
.ribbon-btn:hover{background:#e8e6e4;}
.ribbon-btn.active-hl{background:#ddeeff;border-color:#2b579a;}
.ribbon-btn.need-click{background:#fff3cd;border-color:#f59e0b;animation:needPulse 1.2s ease-in-out infinite;}
.ribbon-btn .rb-icon{font-size:1.6rem;line-height:1;}
.ribbon-btn .rb-lbl{font-size:10px;color:#323130;font-weight:600;text-align:center;line-height:1.2;}
/* Dropdown */
.ribbon-dropdown{
  position:relative;display:flex;flex-direction:column;align-items:center;
}
.ribbon-dropdown-menu{
  display:none;position:absolute;top:100%;left:0;z-index:200;
  background:#fff;border:1px solid #c8c6c4;border-radius:4px;
  box-shadow:0 4px 12px rgba(0,0,0,.18);min-width:180px;padding:4px 0;
}
.ribbon-dropdown-menu.open{display:block;animation:ctxPop .12s ease;}
.rdm-item{
  padding:8px 16px;font-size:13px;cursor:pointer;color:#323130;
  display:flex;align-items:center;gap:8px;transition:background .1s;
}
.rdm-item:hover{background:#eff6ff;}

    {kind:'word',target:'Бабочка',emoji:'🦋'},
    {kind:'word',target:'Пчела',emoji:'🐝'},
  ],
};

// Строим список заданий для уровня:
// hint и solo используют РАЗНЫЕ элементы из банка
function buildLevel(lvId){
  // Берём из банка N*2 элементов, первая половина → hint, вторая → solo
  function hintSoloPairs(pool, n){
    const s=shuffle([...pool]);
    const tasks=[];
    for(let i=0;i<n;i++){
      const hintItem=s[i]||s[0];
      const soloItem=s[n+i]||s[(i+1)%s.length];
      tasks.push({...hintItem,variant:'hint'});
      tasks.push({...soloItem,variant:'solo'});
    }
    return tasks;
  }

  if(lvId===1){
    // corr(2) + shift(2) + caps(1) + punct(2) + enter(2) = 9 → 18 задания
    return shuffle([
      ...hintSoloPairs(BANK.corr,2),
      ...hintSoloPairs(BANK.shift,2),
      ...hintSoloPairs(BANK.caps,1),
      ...hintSoloPairs(BANK.punct,2),
      ...hintSoloPairs(BANK.enter,2),
    ]);
  }
  if(lvId===2){
    // sel(2) + click1(2) + click2(2) + drag(2) + word(1) = 9 → 18 заданий
    return shuffle([
      ...hintSoloPairs(BANK.sel,2),
      ...hintSoloPairs(BANK.click1,2),
      ...hintSoloPairs(BANK.click2,2),
      ...hintSoloPairs(BANK.drag,2),
      ...hintSoloPairs(BANK.word,1),
    ]);
  }
  if(lvId===3){
    // rclick(6) → 12 заданий
    return shuffle(hintSoloPairs(BANK.rclick,6));
  }
  return [];
}

function updateCapsState(e){
  if(e&&e.getModifierState) capsOn=e.getModifierState('CapsLock');
  const t=lvTasks[lvIdx];
  const isCaps=t&&t.kind==='caps';
  const banner=document.getElementById('caps-banner');
  if(banner) banner.classList.toggle('show',capsOn&&!isCaps);
  const ov=document.getElementById('caps-overlay');
  if(ov){
    const block=capsOn&&t&&['shift','punct','corr','sel'].includes(t.kind);
    ov.classList.toggle('show',block);
  }
}

const isHint=()=>lvTasks[lvIdx]&&lvTasks[lvIdx].variant==='hint';

// ---- SELECTION ----
function tmplSel(t){
  charMap=[];
  const words=t.sentence.split(' ');
  let html='';let ci=0;
  words.forEach((w,wi)=>{
    for(let k=0;k<w.length;k++){charMap.push({ch:w[k]});html+=`<span class="wt-ch" data-ci="${ci}">${w[k]}</span>`;ci++;}
    if(wi<words.length-1){charMap.push({ch:' '});html+=`<span class="wt-sp" data-ci="${ci}"> </span>`;ci++;}
  });
  const hint=isHint()?`
    <div class="sec-hint">
      <b>Зажми ЛЕВУЮ кнопку мыши</b> и протяни по буквам слова — они выделятся синим, как в Windows.
      <div class="mouse-row"><div class="mouse-body"><div class="mouse-top"><div class="mouse-l lit"></div><div class="mouse-r"></div></div><div class="mouse-wheel"></div><div class="mouse-bot"></div></div>
      <span><b style="color:#1d4ed8">Зажми и протяни</b> левой кнопкой</span></div>
    </div><div class="divider"></div>`:'';
  return `${hint}
  <div class="sec-task">
    <div class="instruction">Выдели слово <span class="target">${t.target}</span> в предложении:</div>
    <div class="sentence-area" id="sent-area"
         onmousedown="sdStart(event)" onmousemove="sdMove(event)" onmouseup="sdEnd(event)">${html}</div>
  </div>
  <div class="divider"></div>
  <button class="check-btn" onclick="checkSel('${t.target}')">✅ Проверить</button>`;
}

function ciAt(e){const el=e.target;return el.dataset.ci!==undefined?parseInt(el.dataset.ci):-1;}
function applySelHL(){
  if(selDrag.startChar<0)return;
  const s=Math.min(selDrag.startChar,selDrag.endChar),e=Math.max(selDrag.startChar,selDrag.endChar);
  document.querySelectorAll('.wt-ch,.wt-sp').forEach(el=>{const ci=parseInt(el.dataset.ci);el.classList.toggle('hl',ci>=s&&ci<=e);});
}
function sdStart(ev){if(ev.button!==0)return;ev.preventDefault();const i=ciAt(ev);if(i<0)return;selDrag={active:true,startChar:i,endChar:i};applySelHL();}
function sdMove(ev){if(!selDrag.active)return;const i=ciAt(ev);if(i>=0){selDrag.endChar=i;applySelHL();}}
function sdEnd(){selDrag.active=false;}
function checkSel(target){
  if(selDrag.startChar<0){giveErr('Зажми мышку и протяни по буквам слова');return;}
  const s=Math.min(selDrag.startChar,selDrag.endChar),e=Math.max(selDrag.startChar,selDrag.endChar);
  let sel='';for(let ci=s;ci<=e;ci++){if(charMap[ci])sel+=charMap[ci].ch;}
  sel=sel.trim();
  if(sel.toLowerCase()===target.toLowerCase())giveOk('Отлично! Слово выделено правильно! 🎉');
  else if(!sel)giveErr('Зажми мышку и протяни по буквам слова');
  else giveErr(`Выделено: ${sel}. Нужно выделить слово ${target}`);
}

// ---- CORRECTION ----
function tmplCorr(t){
  cState={chars:[...t.wrong],pos:t.wrong.length};
  const html0=corrRender();
  const hint=isHint()?`
    <div class="sec-hint">
      <b>Как исправить:</b><br>
      <span class="kc">← Backspace</span> — удаляет букву <b>перед</b> курсором<br>
      <span class="kc">Delete</span> — удаляет букву <b>после</b> курсора<br>
      После удаления допечатай нужную букву с клавиатуры.
    </div><div class="divider"></div>`:'';
  return `${hint}
  <div class="sec-task">
    <div class="instruction">Исправь ошибку в слове:</div>
    <div class="corr-correct">Правильно: <strong>${t.correct}</strong></div>
    <div class="editable-word" id="eword" tabindex="0"
         onclick="ewClick(event)"
         onfocus="document.getElementById('eword').classList.add('focused')"
         onblur="document.getElementById('eword').classList.remove('focused')"
    >${html0}</div>
    <div class="key-buttons">
      <button class="key-btn bs" id="btn-bs" onclick="corrBS()">⬅ Backspace (Бэкспейс)</button>
      <button class="key-btn dl" id="btn-dl" onclick="corrDel()">Delete (Делит) ➡</button>
    </div>
    <div class="typing-hint">💡 Нажми на букву — курсор встанет перед ней. Удали лишнюю и допечатай нужную.</div>
  </div>
  <div class="divider"></div>
  <div style="position:relative"><div id="caps-overlay" class="caps-overlay">🔴 Выключи Caps Lock перед вводом!</div></div>
  <button class="check-btn" onclick="checkCorr('${t.correct}')">✅ Проверить</button>`;
}
function corrRender(){const{chars,pos}=cState;let h='';chars.forEach((c,i)=>{if(i===pos)h+=`<span class="caret"></span>`;h+=`<span class="ch" data-i="${i}" onclick="chClick(event,${i})">${c}</span>`;});if(pos>=chars.length)h+=`<span class="caret"></span>`;return h;}
function corrRefresh(){const el=document.getElementById('eword');if(el){el.innerHTML=corrRender();el.focus();}}
function ewClick(e){if(e.target===document.getElementById('eword')){cState.pos=cState.chars.length;corrRefresh();}}
function chClick(e,i){e.stopPropagation();cState.pos=i;corrRefresh();}
function corrBS(){flashKey('btn-bs');if(cState.pos>0){cState.chars.splice(cState.pos-1,1);cState.pos--;}corrRefresh();}
function corrDel(){flashKey('btn-dl');if(cState.pos<cState.chars.length){cState.chars.splice(cState.pos,1);}corrRefresh();}
function corrType(ch){if(capsOn)return;cState.chars.splice(cState.pos,0,ch);cState.pos++;corrRefresh();}
function flashKey(id){const el=document.getElementById(id);if(!el)return;el.classList.add('pressed');setTimeout(()=>el.classList.remove('pressed'),160);}
function initCorr(){
  setTimeout(()=>{const el=document.getElementById('eword');if(el)el.focus();},60);
  setKey(e=>{
    if(e.key==='Backspace'){e.preventDefault();corrBS();return;}
    if(e.key==='Delete'){e.preventDefault();corrDel();return;}
    if(e.key==='ArrowLeft'){e.preventDefault();if(cState.pos>0){cState.pos--;corrRefresh();}return;}
    if(e.key==='ArrowRight'){e.preventDefault();if(cState.pos<cState.chars.length){cState.pos++;corrRefresh();}return;}
    if(e.key.length===1&&!e.ctrlKey&&!e.metaKey&&!e.altKey){e.preventDefault();corrType(e.key);}
  });
}
function checkCorr(correct){
  const cur=cState.chars.join('');
  if(normStr(cur)===normStr(correct))giveOk(`Слово исправлено правильно! 🎉`);
  else if(cur.toLowerCase()===correct.toLowerCase())giveErr(`Проверь регистр — должно быть точно: ${correct}`);
  else giveErr(`Пока не так... Правильно: ${correct}`);
}

// ---- PUNCT ----
function tmplPunct(t){
  const hint=isHint()?`
    <div class="sec-hint">
      После запятой — <b>один пробел</b>.<br>
      <b>Запятая:</b> включи русский язык (RU) → <span class="kc">Shift</span> + <span class="kc">.</span><br>
      <b>Точка:</b> клавиша <span class="kc">.</span> &nbsp; <b>Пробел:</b> <span class="kc">Пробел (Space)</span>
    </div><div class="divider"></div>`:'';
  return `${hint}
  <div class="sec-task">
    <div class="instruction">Напечатай правильно: <span class="target">${t.expected}</span></div>
    <div class="input-row">
      <div class="input-arrow"><span class="arr-txt">ПИШИ</span><span class="arr-ico">👉</span></div>
      <div class="input-rel">
        <input class="typing-input" id="punct-inp" type="text" autocomplete="off" spellcheck="false" placeholder="Напечатай здесь…">
        <div id="caps-overlay" class="caps-overlay">🔴 Выключи Caps Lock!</div>
      </div>
    </div>
    <div class="typing-hint">💡 Запятая: Shift + . &nbsp;|&nbsp; Пробел: Space &nbsp;|&nbsp; Точка: .</div>
  </div>
  <div class="divider"></div>
  <button class="check-btn" onclick="checkPunct('${t.expected}')">✅ Проверить</button>`;
}
function checkPunct(exp){
  const norm=s=>normStr(s).replace(/[\u00A0\u202F]/g,' ');
  const v=norm(document.getElementById('punct-inp').value||'');
  const e=norm(exp);
  if(v===e){giveOk('Правильно! 🎉');return;}
  if(!v.includes(','))giveErr('Не хватает запятой! Нажми Shift + точку');
  else if(!v.endsWith('.'))giveErr('Не хватает точки в конце');
  else if(!v.includes(', '))giveErr('После запятой нужен пробел');
  else if(v.toLowerCase()===e.toLowerCase())giveErr('Проверь заглавные и строчные буквы');
  else giveErr(`Должно быть: ${exp}`);
}

// ---- CLICK ----
function tmplClick(t){
  clickState={needed:t.clicks,done:0,lastClickTime:0,pendingSingle:null};
  const icon=t.icon==='folder'?'📁':'🗒️';
  const hint=isHint()?`
    <div class="sec-hint">
      Нажми <b style="color:#1d4ed8">ЛЕВУЮ кнопку мыши</b> — кнопка под указательным пальцем!
      <div class="mouse-row"><div class="mouse-body"><div class="mouse-top"><div class="mouse-l lit"></div><div class="mouse-r"></div></div><div class="mouse-wheel"></div><div class="mouse-bot"></div></div>
      <span><b style="color:#1d4ed8">Левая кнопка</b> — нажми ${t.clicks===1?'один раз':'два раза быстро'}</span></div>
    </div><div class="divider"></div>`:'';
  return `${hint}
  <div class="sec-task">
    <div class="instruction">Нажми ЛЕВОЙ кнопкой мыши ${t.clicks===1?'один раз':'два раза быстро'} на значок:</div>
    <div class="desktop-area">
      <div class="desktop-hint-bar">🖱️ ${t.clicks===1?'Один щелчок ЛЕВОЙ кнопкой':'Два щелчка ЛЕВОЙ кнопкой быстро'}</div>
      <div class="desk-icon" id="desk-icon" onmousedown="handleIconMD(event)">
        <div class="desk-icon-img">${icon}</div>
        <div class="desk-icon-lbl">${t.label}</div>
      </div>
    </div>
    <div class="click-dots">${Array.from({length:t.clicks},(_,i)=>`<div class="click-dot" id="dot-${i}"></div>`).join('')}</div>
    <div class="click-msg" id="click-msg">⬅ Нажми ЛЕВОЙ кнопкой ${t.clicks===1?'один раз':'два раза быстро'}</div>
  </div>
  <div class="divider"></div>`;
}
function handleIconMD(e){
  e.preventDefault();
  if(taskScored)return;
  if(e.button!==0){highlightBtn('left');showCM('❌ Нажми ЛЕВУЮ кнопку мыши (указательный палец)!','#7c2d12');return;}
  flashIcon();
  const needed=clickState.needed,now=Date.now();
  if(needed===1){regLC();}
  else{
    if(clickState.lastClickTime&&(now-clickState.lastClickTime)<500){clearTimeout(clickState.pendingSingle);clickState.lastClickTime=0;regLC();regLC();}
    else{clickState.lastClickTime=now;clearTimeout(clickState.pendingSingle);clickState.pendingSingle=setTimeout(()=>{clickState.lastClickTime=0;showCM('😅 Слишком медленно! Нажми два раза быстро-быстро.','#7c2d12');},600);}
  }
}
function regLC(){
  if(clickState.done>=clickState.needed)return;
  clickState.done++;
  const d=document.getElementById(`dot-${clickState.done-1}`);if(d)d.classList.add('done');
  if(clickState.done>=clickState.needed){
    showCM(clickState.needed===1?'🎉 Щелчок выполнен!':'🎉 Двойной щелчок выполнен!','#14532d');
    setTimeout(()=>giveOk(clickState.needed===1?'Отлично! Одинарный щелчок выполнен! 🖱️':'Отлично! Двойной щелчок выполнен! 🖱️🖱️'),400);
  }else{showCM(`Щелчок ${clickState.done} из ${clickState.needed}… ещё раз!`,'#1e40af');}
}
function flashIcon(){const el=document.getElementById('desk-icon');if(!el)return;el.classList.remove('flashing');void el.offsetWidth;el.classList.add('flashing');setTimeout(()=>el.classList.remove('flashing'),250);}
function showCM(html,color){const el=document.getElementById('click-msg');if(el){el.innerHTML=html;el.style.color=color;}}

function buildCtx(items,cb){
  const m=document.getElementById('ctx-menu');if(!m)return;
  m.innerHTML=items.map(c=>`<div class="ctx-item" data-cmd="${c}">${c}</div>`).join('');
  m.querySelectorAll('.ctx-item').forEach(el=>{
    el.addEventListener('mousedown',ev=>ev.stopPropagation());
    el.addEventListener('click',()=>{hideCtx();cb(el.dataset.cmd);});
  });
}
function showCtxAt(e,items,cb){
  const area=document.getElementById('rclick-area');const m=document.getElementById('ctx-menu');if(!area||!m)return;
  buildCtx(items,cb);
  const rect=area.getBoundingClientRect();
  m.style.left=Math.min(e.clientX-rect.left,area.offsetWidth-160)+'px';
  m.style.top=(e.clientY-rect.top)+'px';
  m.style.display='block';
  setTimeout(()=>document.addEventListener('mousedown',outsideCtx,{once:true}),60);
}
function hideCtx(){const m=document.getElementById('ctx-menu');if(m)m.style.display='none';}
function outsideCtx(e){const m=document.getElementById('ctx-menu');if(m&&!m.contains(e.target))hideCtx();}

function rcMD(e,zone){
  if(e.button===0){e.preventDefault();highlightBtn('right');showRM('❌ Нажми ПРАВУЮ кнопку мыши (средний палец, справа)!','#7c2d12');hideCtx();}
}
function rcCtx(e,zone){
  e.preventDefault();if(taskScored)return;
  const cmd=rSt.cmd;
  const CMDS=['Копировать','Вырезать','Удалить','Вставить'];
  if(rSt.step==='pic'&&zone==='pic'){
    showCtxAt(e,CMDS,chosen=>{
      if(chosen===cmd){
        if(cmd==='Удалить'){
          rcHide();showRM('✅ Удалено! Картинка исчезла.','#14532d');
          setTimeout(()=>giveOk('Картинка удалена правильно! 🗑️'),500);
        }else{
          rcHide();
          showRM(cmd==='Копировать'?'✅ Скопировано! Теперь нажми правой кнопкой на пустое место и выбери Вставить':'✅ Вырезано! Нажми правой кнопкой на пустое место и выбери Вставить','#1e40af');
          document.getElementById('rclick-empty').style.display='flex';
          rSt.step='empty';
        }
      }else wrongCmd(chosen,cmd);
    });
  }else if(rSt.step==='empty'&&zone==='empty'){
    showCtxAt(e,CMDS,chosen=>{
      if(chosen==='Вставить'){
        if(cmd==='Копировать'){document.getElementById('rclick-copy').style.display='flex';document.getElementById('rclick-empty').style.display='none';showRM('🎉 Вставлено! Рядом появилась копия!','#14532d');setTimeout(()=>giveOk('Скопировал и вставил — рядом появилась копия! 📋'),500);}
        else{rcShow();document.getElementById('rclick-empty').style.display='none';showRM('🎉 Вставлено! Картинка появилась снова!','#14532d');setTimeout(()=>giveOk('Вырезал и вставил — картинка вернулась! ✂️📋'),500);}
      }else wrongCmd(chosen,'Вставить');
    });
  }else if(zone==='pic'&&rSt.step==='empty'){
    showRM('Картинка скопирована! Нажми правой кнопкой на пустое место справа.','#92400e');
  }
}
function rcHide(){const img=document.getElementById('rclick-img');if(img){img.style.opacity='0';img.style.pointerEvents='none';img.style.transition='opacity .4s';}}
function rcShow(){const img=document.getElementById('rclick-img');if(img){img.style.opacity='1';img.style.pointerEvents='auto';img.style.transition='opacity .4s';}}
function wrongCmd(chosen,needed){
  showRM(`❌ Это ${chosen}. Нужна команда ${needed}. Нажми правой кнопкой ещё раз!`,'#7c2d12');
  document.querySelectorAll('.ctx-item').forEach(el=>{if(el.dataset.cmd===needed){el.classList.add('ctx-highlight');setTimeout(()=>el.classList.remove('ctx-highlight'),900);}});
}
function showRM(html,color){const el=document.getElementById('rclick-msg');if(el){el.innerHTML=html;el.style.color=color||'';};}

let dragState={dragging:false,dropped:false};

function tmplDrag(t){
  dragState={dragging:false,dropped:false};
  const hint=isHint()?`
    <div class="sec-hint">
      <b>Как перетащить файл в папку:</b><br>
      1. Зажми ЛЕВУЮ кнопку мыши на значке файла<br>
      2. Не отпуская — перемести мышь к папке<br>
      3. Когда папка подсветится — отпусти кнопку<br>
      <div class="mouse-row"><div class="mouse-body"><div class="mouse-top"><div class="mouse-l lit"></div><div class="mouse-r"></div></div><div class="mouse-wheel"></div><div class="mouse-bot"></div></div>
      <span><b style="color:#1d4ed8">Зажми и тяни</b> левой кнопкой</span></div>
    </div><div class="divider"></div>`:'';
  return `${hint}
  <div class="sec-task">
    <div class="instruction">Перетащи файл в папку — зажми ЛЕВОЙ кнопкой и потяни:</div>
    <div class="drag-area" id="drag-area"
         onmousemove="dragMove(event)" onmouseup="dragDrop(event)"
         onmouseleave="dragCancel()">
      <!-- ФАЙЛ -->
      <div class="drag-file" id="drag-file"
           onmousedown="dragStart(event)">
        <div class="drag-icon-img">${t.file.emoji}</div>
        <div class="drag-icon-lbl">${t.file.label}</div>
      </div>
      <!-- СТРЕЛКА -->
      <div class="drag-arrow" id="drag-arrow">→</div>
      <!-- ПАПКА -->
      <div class="drag-folder" id="drag-folder">
        <div class="folder-with-file">
          <div class="drag-icon-img">📁</div>
          <div class="folder-inner-file" id="folder-inner">${t.file.emoji}</div>
        </div>
        <div class="drag-icon-lbl">Папка ${t.folder.label}</div>
      </div>
    </div>
    <div class="drag-msg" id="drag-msg">⬅ Зажми файл ЛЕВОЙ кнопкой и перетащи в папку</div>
  </div>
  <div class="divider"></div>`;
}

// Призрак при перетаскивании
let _ghostEl=null;
function dragStart(e){
  if(e.button!==0) return;
  if(dragState.dropped) return;
  e.preventDefault();
  dragState.dragging=true;
  // Показываем призрак
  const file=document.getElementById('drag-file');
  if(!_ghostEl){
    _ghostEl=document.createElement('div');
    _ghostEl.id='drag-ghost';
    _ghostEl.innerHTML=file.innerHTML;
    _ghostEl.style.cssText='position:fixed;pointer-events:none;z-index:9999;display:flex;flex-direction:column;align-items:center;opacity:0.85;transform:translate(-50%,-50%);font-weight:800;';
    document.body.appendChild(_ghostEl);
  }
  _ghostEl.style.left=e.clientX+'px';
  _ghostEl.style.top=e.clientY+'px';
  _ghostEl.style.display='flex';
  file.classList.add('dragging');
  showDragMsg('Тяни к папке… не отпускай кнопку!','#1e40af');
}

function dragMove(e){
  if(!dragState.dragging) return;
  e.preventDefault();
  if(_ghostEl){_ghostEl.style.left=e.clientX+'px';_ghostEl.style.top=e.clientY+'px';}
  // Проверяем наведение на папку
  const folder=document.getElementById('drag-folder');
  if(!folder) return;
  const r=folder.getBoundingClientRect();
  const over=e.clientX>=r.left&&e.clientX<=r.right&&e.clientY>=r.top&&e.clientY<=r.bottom;
  folder.classList.toggle('over',over);
  if(over) showDragMsg('Отпусти кнопку — положи файл в папку!','#16a34a');
  else showDragMsg('Тяни к папке… не отпускай кнопку!','#1e40af');
}

function dragDrop(e){
  if(!dragState.dragging) return;
  dragState.dragging=false;
  hideDragGhost();
  const folder=document.getElementById('drag-folder');
  const file=document.getElementById('drag-file');
  if(!folder||!file) return;
  const r=folder.getBoundingClientRect();
  const dropped=e.clientX>=r.left&&e.clientX<=r.right&&e.clientY>=r.top&&e.clientY<=r.bottom;
  folder.classList.remove('over');
  if(dropped){
    dragState.dropped=true;
    file.classList.remove('dragging');
    file.classList.add('placed');
    folder.classList.add('success');
    document.getElementById('drag-arrow').style.display='none';
    showDragMsg('🎉 Файл помещён в папку! Молодец!','#14532d');
    setTimeout(()=>giveOk('Отлично! Ты перетащил файл в папку! 📁'),500);
  } else {
    file.classList.remove('dragging');
    showDragMsg('Не попал в папку. Попробуй ещё раз!','#7c2d12');
    giveErr('Не попал в папку. Зажми файл и перетащи его на папку.');
  }
}

function dragCancel(){
  if(!dragState.dragging) return;
  dragState.dragging=false;
  hideDragGhost();
  const file=document.getElementById('drag-file');
  const folder=document.getElementById('drag-folder');
  if(file) file.classList.remove('dragging');
  if(folder) folder.classList.remove('over');
  showDragMsg('Мышь вышла за пределы. Попробуй ещё раз!','#7c2d12');
}

function hideDragGhost(){
  if(_ghostEl){_ghostEl.style.display='none';}
}

function showDragMsg(html,color){
  const el=document.getElementById('drag-msg');
  if(el){el.innerHTML=html;el.style.color=color;}
}

function tmplEnter(t){
  const hint=isHint()?`
    <div class="sec-hint">
      Чтобы начать новую строку — нажми клавишу <span class="key-enter">Enter (Энтер) ↵</span><br>
      Она находится справа на клавиатуре — большая клавиша со стрелкой ↵<br>
      Напечатай первое слово → нажми <span class="key-enter">Enter</span> → напечатай второе слово
    </div><div class="divider"></div>`:'';
  return `${hint}
  <div class="sec-task">
    <div class="instruction">Напечатай два слова — каждое на новой строке:</div>
    <div style="display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap;margin-bottom:10px;">
      <div style="flex:1;min-width:140px;">
        <div style="font-size:0.9rem;font-weight:800;color:var(--muted);margin-bottom:4px;">Строка 1:</div>
        <div style="font-size:1.8rem;font-weight:900;color:var(--primary);">${t.word1}</div>
      </div>
      <div style="font-size:2rem;color:var(--muted);margin-top:18px">↵</div>
      <div style="flex:1;min-width:140px;">
        <div style="font-size:0.9rem;font-weight:800;color:var(--muted);margin-bottom:4px;">Строка 2:</div>
        <div style="font-size:1.8rem;font-weight:900;color:var(--primary);">${t.word2}</div>
      </div>
    </div>
    <div class="enter-area">
      <textarea class="enter-textarea" id="enter-inp" rows="3"
        placeholder="Напечатай здесь…" autocomplete="off" spellcheck="false"
        oninput="checkEnterLive('${t.word1}','${t.word2}')"></textarea>
      <div class="typing-hint">
        💡 Напечатай <b>${t.word1}</b> → нажми <span class="key-enter">Enter ↵</span> → напечатай <b>${t.word2}</b>
      </div>
    </div>
  </div>
  <div class="divider"></div>
  <button class="check-btn" onclick="checkEnter('${t.word1}','${t.word2}')">✅ Проверить</button>`;
}

function checkEnterLive(w1,w2){
  // Подсвечиваем в реальном времени
  const el=document.getElementById('enter-inp');
  if(!el) return;
  const lines=el.value.split('\n');
  if(lines.length>=2&&lines[0].trim().toLowerCase()===w1.toLowerCase()
     &&lines[1].trim().toLowerCase()===w2.toLowerCase()){
    el.style.borderColor='#16a34a';
  } else {
    el.style.borderColor='';
  }
}

function checkEnter(w1,w2){
  const el=document.getElementById('enter-inp');
  if(!el) return;
  const raw=el.value;
  const lines=raw.split('\n').map(l=>l.trim()).filter((_,i)=>i===0||_); // сохраняем первую строку даже пустую
  if(lines.length<2){
    giveErr('Нужно написать два слова на разных строках. Нажми Enter после первого слова!');
    return;
  }
  const l1=lines[0].trim(), l2=lines[1].trim();
  if(l1.toLowerCase()===w1.toLowerCase()&&l2.toLowerCase()===w2.toLowerCase()){
    giveOk(`Отлично! Ты написал оба слова на разных строках с помощью Enter! 🎉`);
  } else if(!raw.includes('\n')){
    giveErr('Не забудь нажать Enter между словами, чтобы перейти на новую строку!');
  } else if(l1.toLowerCase()!==w1.toLowerCase()){
    giveErr(`Первое слово должно быть ${w1}. Проверь написание.`);
  } else {
    giveErr(`Второе слово должно быть ${w2}. Проверь написание.`);
  }
}

/*

  1. Нажать вкладку Вставка

  5. Выбрать нужную картинку (Бабочка или Пчела) — одиночный клик
  6. Нажать кнопку Вставить

*/
let wSt={step:0, selectedFile:'', dialogView:'desktop'}; // шаги: 0-6

      3. В окне слева выбери <b>Рабочий стол</b><br>
      4. Справа появится папка <b>Рисунки</b> — открой её двойным щелчком<br>
      5. Выбери картинку <b>${t.target}</b> — нажми один раз<br>
      6. Нажми кнопку <b>Вставить</b>

  return `${hint}
  <div class="sec-task">
    <div class="instruction">Вставь рисунок <span class="target">${t.target}</span> в документ Word:</div>

    <div class="word-step-indicator" id="word-steps">
      <div class="word-step active" id="ws0">1. Вкладка Вставка</div>
      <div class="word-step" id="ws1">2. Рисунки → Это устройство</div>
      <div class="word-step" id="ws2">3. Рабочий стол</div>
      <div class="word-step" id="ws3">4. Папка Рисунки</div>
      <div class="word-step" id="ws4">5. Выбрать ${t.target}</div>
      <div class="word-step" id="ws5">6. Вставить</div>
    </div>

    <!-- WORD SIMULATOR -->
    <div class="word-sim" style="position:relative">

      <!-- TITLE BAR -->
      <div class="word-titlebar">
        <span class="wt-icon">📄</span>
        <span class="wt-title">Документ1 — Microsoft Word</span>
        <div class="wt-btns">
          <div class="wt-btn">─</div>
          <div class="wt-btn">□</div>
          <div class="wt-btn close">✕</div>
        </div>
      </div>

      <!-- RIBBON TABS — по умолчанию активна Главная -->
      <div class="word-ribbon">
        <div class="word-tabs">

// ── Word шаги ─────────────────────────────────────
function wSetStep(n){
  wSt.step=n;
  for(let i=0;i<=5;i++){
    const el=document.getElementById(`ws${i}`);
    if(!el) continue;
    el.className='word-step'+(i<n?' done':i===n?' active':'');
  }
  // Подсветка нужного элемента на каждом шаге
  // Сбрасываем все highlight-классы
  ['wtab-insert'].forEach(id=>{const e=document.getElementById(id);if(e)e.classList.remove('need-click-tab');});
  ['ribbon-pic-btn'].forEach(id=>{const e=document.getElementById(id);if(e){e.classList.remove('need-click');}});
  document.querySelectorAll('.rdm-item').forEach(e=>e.classList.remove('need-click'));
  document.querySelectorAll('.dialog-tree-item').forEach(e=>e.classList.remove('need-click'));
  document.querySelectorAll('.dialog-folder').forEach(e=>e.classList.remove('need-click'));
  document.querySelectorAll('.dialog-file').forEach(e=>e.classList.remove('need-click'));
  const btnIns=document.getElementById('btn-insert-pic');
  if(btnIns) btnIns.classList.remove('need-click');

  if(n===0){
    // Подсветить вкладку Вставка
    const tab=document.getElementById('wtab-insert');
    if(tab) tab.classList.add('need-click-tab');
  } else if(n===1){
    // Подсветить кнопку Рисунки
    const pb=document.getElementById('ribbon-pic-btn');
    if(pb) pb.classList.add('need-click');
  } else if(n===2){
    // Подсветить пункт "Это устройство"
    const menu=document.getElementById('pic-menu');
    if(menu){
      const items=menu.querySelectorAll('.rdm-item');
      if(items[0]) items[0].classList.add('need-click');
    }
  } else if(n===3){
    // Подсветить "Рабочий стол" в сайдбаре
    const desk=document.getElementById('sidebar-desktop');
    if(desk) desk.classList.add('need-click');
  } else if(n===4){
    // Подсветить папку Рисунки
    const folder=document.querySelector('.dialog-folder');
    if(folder) folder.classList.add('need-click');
  } else if(n===6){
    // Подсветить кнопку Вставить
    const btn=document.getElementById('btn-insert-pic');
    if(btn) btn.classList.add('need-click');
  }
}
function wShowMsg(msg,color){
  const el=document.getElementById('word-msg');
  if(el){el.innerHTML=msg;el.style.color=color||'var(--text)';}
}

function wClickTab(){
  if(wSt.step>0) return;
  // Переключаем ленту: скрываем Главная, показываем Вставка
  const ribHome=document.getElementById('ribbon-home');
  const ribIns=document.getElementById('ribbon-insert');
  if(ribHome) ribHome.style.display='none';
  if(ribIns)  ribIns.style.display='flex';
  // Переключаем вкладки
  const tabHome=document.getElementById('wtab-home');
  const tabIns=document.getElementById('wtab-insert');
  if(tabHome) tabHome.classList.remove('active');
  if(tabIns){tabIns.classList.remove('need-click-tab');tabIns.classList.add('active');}
  wSetStep(1);
  wShowMsg('Молодец! Теперь нажми кнопку Рисунки 🖼️','#1e40af');
}
function wWrongTab(name){
  if(wSt.step===0) giveErr(`Это вкладка ${name}. Тебе нужна вкладка Вставка!`);
}
function wClickPicBtn(){
  if(wSt.step!==1){wWrongStep('Сначала нажми вкладку Вставка');return;}
  wSetStep(2);
  const menu=document.getElementById('pic-menu');
  if(menu) menu.classList.add('open');
  wShowMsg('Отлично! Выбери пункт Это устройство...','#1e40af');
  // Close menu on outside click
  setTimeout(()=>document.addEventListener('mousedown',wCloseMenuOutside,{once:true}),80);
}
function wCloseMenuOutside(e){
  const menu=document.getElementById('pic-menu');
  if(menu&&!menu.contains(e.target)) menu.classList.remove('open');
}
function wClickDevice(){
  if(wSt.step!==2){wWrongStep('Сначала нажми кнопку Рисунки');return;}
  document.getElementById('pic-menu').classList.remove('open');
  wSetStep(3);
  document.getElementById('word-dialog').classList.add('open');
  wShowMsg('Диалог открыт! Выбери Рабочий стол слева','#1e40af');
}
function wClickDesktop(){
  if(wSt.step!==3){wWrongStep('Нажми сначала Это устройство');return;}
  wSt.dialogView='desktop';
  document.querySelectorAll('.dialog-tree-item').forEach(el=>el.classList.remove('selected','need-click'));
  document.getElementById('sidebar-desktop').classList.add('selected');
  const fi=document.getElementById('dialog-files-images');
  if(fi) fi.style.display='none';
  document.getElementById('dialog-files-desktop').style.display='flex';
  document.getElementById('dialog-files-risunki').style.display='none';
  wSetStep(4);
  wShowMsg('Рабочий стол выбран! Открой папку Рисунки двойным щелчком 👆👆','#1e40af');
}
function wSelectFolder(){
  if(wSt.step>=4) wShowMsg('Нажми на папку Рисунки ДВА РАЗА быстро (двойной щелчок) 👆👆','#92400e');
}
function wOpenRisunki(){
  if(wSt.step!==4){
    if(wSt.step<4) wWrongStep('Сначала выбери Рабочий стол слева');
    return;
  }
  document.getElementById('dialog-files-desktop').style.display='none';
  document.getElementById('dialog-files-risunki').style.display='flex';
  wSt.dialogView='risunki';
  wSetStep(5); // highlights both image files
  // Highlight both files (since we don't know which is needed yet, highlight both)
  ['df-butterfly','df-bee'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.classList.add('need-click');
  });
  wShowMsg('Папка открыта! Выбери картинку одним щелчком','#1e40af');
}
function wSelectFile(name, target){
  if(wSt.step!==5){
    if(wSt.step<5) wWrongStep('Сначала открой папку Рисунки');
    return;
  }
  ['df-butterfly','df-bee'].forEach(id=>{
    const el=document.getElementById(id);
    if(el){el.classList.remove('selected-file','need-click');}
  });
  const sel=document.getElementById(name==='Бабочка'?'df-butterfly':'df-bee');
  if(sel) sel.classList.add('selected-file');
  wSt.selectedFile=name;
  document.getElementById('dialog-filename').value=name;
  const btn=document.getElementById('btn-insert-pic');
  if(btn){btn.classList.remove('disabled');btn.classList.add('need-click');}
  wSetStep(6);
  wShowMsg(`Выбрана: ${name}. Теперь нажми кнопку Вставить ↓`,'#1e40af');
}
function wInsertPic(target, emoji){
  if(wSt.step!==6){wWrongStep('Сначала выбери картинку');return;}
  if(!wSt.selectedFile){wWrongStep('Сначала выбери картинку');return;}
  if(wSt.selectedFile!==target){
    giveErr(`Нужно выбрать картинку ${target}, а выбрана ${wSt.selectedFile}. Попробуй снова!`);
    // Reset selection
    wSt.selectedFile='';
    document.getElementById('dialog-filename').value='';
    ['df-butterfly','df-bee'].forEach(id=>{const el=document.getElementById(id);if(el)el.classList.remove('selected-file');});
    document.getElementById('btn-insert-pic').classList.add('disabled');
    wSetStep(5);
    return;
  }
  // Успех!
  wCloseDialog();
  const content=document.getElementById('word-content');
  if(content){
    content.innerHTML=`<div class="word-inserted-img">${emoji}</div>`;
  }
  document.getElementById('word-caption').textContent=`Рисунок: ${target}`;
  wShowMsg(`🎉 Рисунок ${target} успешно вставлен в документ!`,'#14532d');
  setTimeout(()=>giveOk(`Отлично! Ты вставил рисунок ${target} в Word! 💻🖼️`),600);
}

//  FEEDBACK + SCORE
// ═══════════════════════════════════════════════════
function giveOk(msg){
  if(taskScored)return;
  taskScored=true;
  const t=lvTasks[lvIdx];
  lvResults.push({ok:true,errors:taskErrors,kind:t.kind,variant:t.variant,label:kindLabel(t)});
  renderLvProgress();
  showFb(true,msg);
  document.getElementById('next-btn').classList.add('show');
  document.getElementById('main-card').className='card ok';
}
function giveErr(msg){
  taskErrors++;
  showFb(false,msg);
  document.getElementById('main-card').className='card bad';
}
function showFb(ok,msg){
  const fb=document.getElementById('feedback');
  fb.className=`sec-feedback show ${ok?'ok':'bad'}`;
  document.getElementById('fb-emo').textContent=ok?rnd(OK_EMO):rnd(BAD_EMO);
  document.getElementById('fb-txt').textContent=msg;
}

function kindLabel(t){
  const km={sel:'Выделение',corr:'Исправление',shift:'Shift',punct:'Пробел/Запятая',caps:'Caps Lock',click:'Клик мышью',rclick:'Правая кнопка',drag:'Перетаскивание',enter:'Enter/Новая строка',word:'Вставка в Word'};
  return km[t.kind]||t.kind;
}

//  НАВИГАЦИЯ ЗАДАНИЙ
// ═══════════════════════════════════════════════════
function nextTask(){
  if(!taskScored){
    const t=lvTasks[lvIdx];
    lvResults.push({ok:false,errors:taskErrors+1,kind:t.kind,variant:t.variant,label:kindLabel(t)});
  }
  lvIdx++; dropKey(); renderTask();
}

//  ПРОМЕЖУТОЧНЫЕ ИТОГИ
// ═══════════════════════════════════════════════════
function showMidResults(){
  allLvResults[curLevel]=lvResults;
  hide('task-container'); hide('level-bar');
  document.getElementById('caps-banner').classList.remove('show');

  const total=lvResults.length;
  const ok=lvResults.filter(r=>r.ok).length;
  const errs=lvResults.reduce((s,r)=>s+(r.errors||0),0);
  const pct=Math.round(ok/total*100);

  // Группировка по темам
  const topics={};
  lvResults.forEach(r=>{
    if(!topics[r.kind]) topics[r.kind]={ok:0,total:0,label:r.label};
    topics[r.kind].total++;
    if(r.ok) topics[r.kind].ok++;
  });

  const topicRows=Object.values(topics).map(tp=>{
    const p=Math.round(tp.ok/tp.total*100);
    const cls=p>=80?'ok':p>=50?'mid':'bad';
    return `<div class="topic-row">
      <div class="t-name">${tp.label}</div>
      <div class="topic-bar-bg"><div class="topic-bar-fill ${cls}" style="width:${p}%"></div></div>
      <div class="topic-pct" style="color:${cls==='ok'?'#15803d':cls==='mid'?'#92400e':'#b91c1c'}">${p}%</div>
    </div>`;
  }).join('');

  const nextLv=curLevel<3?curLevel+1:null;
  const nextBtn=nextLv
    ?`<button class="start-btn ${nextLv===2?'orange':'red'}" onclick="showLevelIntro(${nextLv})">▶ Уровень ${nextLv}</button>`
    :`<button class="start-btn" onclick="showFinalResults()" style="background:linear-gradient(135deg,#7c3aed,#6d28d9)">🏆 Итоги</button>`;

  document.getElementById('mid-screen').innerHTML=`
    <div class="mid-res">
      <div class="mid-res-title">✅ Уровень ${curLevel} завершён!</div>
      <div class="mid-stat-row">
        <div class="stat-box"><div class="sv">${ok}</div><div class="sl">Правильно ✅</div></div>
        <div class="stat-box"><div class="sv">${total-ok}</div><div class="sl">Не выполнено ❌</div></div>
        <div class="stat-box"><div class="sv">${pct}%</div><div class="sl">Результат</div></div>
        <div class="stat-box"><div class="sv">${errs}</div><div class="sl">Лишних попыток 🔄</div></div>
      </div>
      <div class="topics-grid">${topicRows}</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:16px;">
        <button class="start-btn" onclick="retryLevel(${curLevel})" style="background:#64748b">🔄 Повторить уровень</button>
        ${nextBtn}
        <button class="start-btn" onclick="chooseLevelScreen()" style="background:#94a3b8;font-size:0.95rem">📚 Выбрать уровень</button>
      </div>
    </div>`;
  show('mid-screen');
}

function retryLevel(lvId){
  hide('mid-screen');
  startLevel(lvId);
}

// ═══════════════════════════════════════════════════
//  ФИНАЛЬНЫЕ ИТОГИ
// ═══════════════════════════════════════════════════
function showFinalResults(){
  hide('mid-screen');

  // Сбор всех результатов по уровням
  let totalOk=0,totalAll=0,totalErr=0;
  const lvScores={};
  [1,2,3].forEach(lv=>{
    const res=allLvResults[lv]||[];
    const ok=res.filter(r=>r.ok).length;
    const all=res.length;
    const err=res.reduce((s,r)=>s+(r.errors||0),0);
    lvScores[lv]={ok,all,err,pct:all?Math.round(ok/all*100):0};
    totalOk+=ok; totalAll+=all; totalErr+=err;
  });

  // Итоговый балл: базовый от % правильных, штраф за ошибки, min 7 если все пройдены
  let raw=totalAll?totalOk/totalAll*10:0;
  raw-=totalErr*0.08;
  const allDone=[1,2,3].every(lv=>(allLvResults[lv]||[]).length>0);
  if(allDone&&totalOk===totalAll) raw=Math.max(raw,7);
  const finalScore=Math.min(10,Math.max(0,Math.round(raw)));

  // Группировка по темам (все уровни)
  const allRes=Object.values(allLvResults).flat();
  const topics={};
  allRes.forEach(r=>{
    if(!topics[r.kind])topics[r.kind]={ok:0,total:0,label:r.label};
    topics[r.kind].total++;if(r.ok)topics[r.kind].ok++;
  });
  const topicRows=Object.values(topics).map(tp=>{
    const p=Math.round(tp.ok/tp.total*100);
    const cls=p>=80?'ok':p>=50?'mid':'bad';
    return `<div class="topic-row">
      <div class="t-name">${tp.label}</div>
      <div class="topic-bar-bg"><div class="topic-bar-fill ${cls}" style="width:${p}%"></div></div>
      <div class="topic-pct" style="color:${cls==='ok'?'#15803d':cls==='mid'?'#92400e':'#b91c1c'}">${p}%</div>
    </div>`;
  }).join('');

  let emo,title,sub;
  if(finalScore>=9){emo='🏆';title='Отлично!';sub='Ты настоящий мастер компьютера!';}
  else if(finalScore>=7){emo='🌟';title='Хорошо!';sub='Ты очень хорошо справился!';}
  else if(finalScore>=5){emo='😊';title='Неплохо!';sub='Ещё немного практики — и ты мастер!';}
  else{emo='💪';title='Не сдавайся!';sub='Попробуй снова — у тебя всё получится!';}

  document.getElementById('f-emo').textContent=emo;
  document.getElementById('f-title').textContent=title;
  document.getElementById('f-sub').textContent=sub;
  document.getElementById('f-score').textContent=finalScore;

  document.getElementById('f-lv-summary').innerHTML=[1,2,3].map(lv=>{
    const ls=lvScores[lv];
    return `<div class="lv-sum-box l${lv}">
      <div class="ls-v">${ls.pct}%</div>
      <div class="ls-l">Уровень ${lv}</div>
    </div>`;
  }).join('');

  document.getElementById('f-topic-grid').innerHTML=topicRows;

  document.getElementById('f-detail').innerHTML=allRes.map(r=>`
    <div class="det-item">
      <span style="font-size:1.2rem">${r.ok?'✅':'❌'}</span>
      <span>${r.label}</span>
      <span style="font-size:0.8rem;color:var(--muted);margin-left:4px">${r.variant==='hint'?'💡':'✏️'}</span>
      <span style="margin-left:auto;font-size:0.85rem;color:var(--muted)">${r.ok?(r.errors>0?`+${r.errors} ош.`:'✓'):'—'}</span>
    </div>`).join('');

  show('final-screen');
}

// ═══════════════════════════════════════════════════
//  РЕСТАРТ
// ═══════════════════════════════════════════════════
function restart(){
  allLvResults={};
  hide('final-screen');hide('mid-screen');hide('task-container');hide('level-bar');
  document.getElementById('caps-banner').classList.remove('show');
  chooseLevelScreen();
}

// ═══════════════════════════════════════════════════
//  СТАРТ
// ═══════════════════════════════════════════════════
chooseLevelScreen();
</script>
